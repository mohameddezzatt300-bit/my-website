}

function kpiXLUpdateMap(key,val){if(val==='')delete _kpiXLMap[key];else _kpiXLMap[key]=parseInt(val)}

function kpiXLConfirm(){
  const a=acct();if(!a)return;
  if(!_kpiXLRows.length){kpiXLClose();return}

  const imported=[];
  _kpiXLRows.forEach(row=>{
    const entry={id:uid(),week:'',roas:'',cpa:'',ctr:'',cpm:'',spend:'',revenue:'',conv:'',notes:''};
    let hasData=false;

    Object.entries(_kpiXLMap).forEach(([key,colIdx])=>{
      const raw=row[colIdx];
      if(raw===''||raw==null)return;
      hasData=true;

      if(key==='week'){
        if(raw instanceof Date){
          // Excel date → Mon-Sun range
          const d=new Date(raw);
          const dow=(d.getDay()||7);
          const mon=new Date(d);mon.setDate(d.getDate()-dow+1);
          const sun=new Date(mon);sun.setDate(mon.getDate()+6);
          entry.week=isoFmt(mon)+' - '+isoFmt(sun);
        }else if(typeof raw==='number'&&raw>40000){
          // Excel serial date number
          const d=new Date(Math.round((raw-25569)*86400000));
          const dow=(d.getDay()||7);
          const mon=new Date(d);mon.setDate(d.getDate()-dow+1);
          const sun=new Date(mon);sun.setDate(mon.getDate()+6);
          entry.week=isoFmt(mon)+' - '+isoFmt(sun);
        }else{
          const s=String(raw).trim();
          // Extract first date from any text containing a date
          const dm=s.match(/(\d{4}[-\/]\d{1,2}[-\/]\d{1,2})/);
          if(dm){
            const d=new Date(dm[1].replace(/\//g,'-'));
            if(!isNaN(d)){
              const dow=(d.getDay()||7);
              const mon=new Date(d);mon.setDate(d.getDate()-dow+1);
              const sun=new Date(mon);sun.setDate(mon.getDate()+6);
              entry.week=isoFmt(mon)+' - '+isoFmt(sun);
            }else{entry.week=s}
          }else{entry.week=s}
        }
      }else if(key==='notes'){
        entry.notes=String(raw).trim();
      }else{
        const num=parseFloat(String(raw).replace(/[^0-9.\-]/g,''));
        if(!isNaN(num))entry[key]=String(num);
      }
    });

    if(hasData)imported.push(entry);
  });

  if(!imported.length){alert('مفيش بيانات اتعرفت — تأكد من الـ mapping');return}
  if(!a.kpis)a.kpis=[];
  a.kpis.push(...imported);
  save();kpiXLClose();renderMain();
  setTimeout(()=>alert(`✅ تم استيراد ${imported.length} صف بنجاح`),100);
}

function renderTabs(){
  const bar=document.getElementById('tabs-bar');
  const addBtn=document.getElementById('add-tab-btn');
  const tasksBtn=document.getElementById('my-tasks-btn');
  bar.innerHTML='';
  bar.appendChild(tasksBtn);
  tasksBtn.classList.toggle('active',gview==='mytasks');

  db.accounts.forEach(a=>{
    const pend=a.tasks.filter(t=>t.status!=='done').length;
    const btn=document.createElement('button');
    btn.className='tab-btn'+(a.id===db.active&&gview!=='mytasks'?' active':'');
    btn.innerHTML=`<span>${esc(a.name)}</span><span class="tab-count">${pend}</span><button class="tab-x" title="Delete">×</button>`;
    btn.onclick=()=>setAcc(a.id);
    btn.querySelector('.tab-x').onclick=e=>{e.stopPropagation();delAcc(a.id)};
    // drag-to-reorder accounts
    btn.draggable=true;
    btn.ondragstart=e=>{dragAccId=a.id;btn.classList.add('dragging');e.dataTransfer.effectAllowed='move'};
    btn.ondragend=()=>{dragAccId=null;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('dragging','drag-over'))};
    btn.ondragover=e=>{e.preventDefault();if(dragAccId&&dragAccId!==a.id)btn.classList.add('drag-over')};
    btn.ondragleave=()=>btn.classList.remove('drag-over');
    btn.ondrop=e=>{
      e.preventDefault();btn.classList.remove('drag-over');
      if(!dragAccId||dragAccId===a.id)return;
      const fi=db.accounts.findIndex(x=>x.id===dragAccId);
      const ti=db.accounts.findIndex(x=>x.id===a.id);
      const [moved]=db.accounts.splice(fi,1);
      db.accounts.splice(ti,0,moved);
      save();renderTabs();
    };
    bar.appendChild(btn);
  });
  bar.appendChild(addBtn);
}

      btn.ondragleave=()=>btn.classList.remove('drag-over');
      btn.ondrop=e=>{

  const cnt=s=>s==='all'?a.tasks.length:a.tasks.filter(t=>t.status===s).length;

            ${t.platform?`<span class="tag tp">${esc(t.platform)}</span>`:''}
            ${t.segment?`<span class="tag ts">👥 ${esc(t.segment)}</span>`:''}
            ${t.deadline?`<span class="tag td-tag${ov?' ov':''}">📅 ${dl}${ov?' ⚠️':''}</span>`:''}
            ${t.refLink?`<span class="t-ref">🔗 <a href="${esc(t.refLink)}" target="_blank" rel="noopener">Reference</a></span>`:''}
          </div>
          ${t.notes?`<div class="t-notes">${esc(t.notes)}</div>`:''}
        </div>
        <div class="t-ctrl">
          <select class="ss" onchange="setTS('${a.id}','${t.id}',this.value)">
            <option value="pending"${t.status==='pending'?' selected':''}>📋 Pending</option>
            <option value="in-progress"${t.status==='in-progress'?' selected':''}>⚡ In Progress</option>
            <option value="done"${t.status==='done'?' selected':''}>✅ Done</option>
          </select>
          <button class="btn btn-d btn-xs" onclick="delT('${a.id}','${t.id}')">Delete</button>
        </div>
      </div>`;
    });
    h+='</div>';
  }
  main.innerHTML=h;
}

// ── LOGIN GATE — per-user passwords ──
// Storage: mbd_users → [{email,hash,name,isAdmin}]
const USERS_KEY='mbd_users';
const SESSION_KEY='mbd_session';
const SESSION_EMAIL_KEY='mbd_session_email';
const DEFAULT_ADMIN_HASH='8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918'; // "admin"

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function getUsers(){try{return JSON.parse(localStorage.getItem(USERS_KEY)||'[]')}catch{return[]}}
function saveUsers(arr){localStorage.setItem(USERS_KEY,JSON.stringify(arr))}
function isLoggedIn(){return sessionStorage.getItem(SESSION_KEY)==='1'}
function currentUserEmail(){return sessionStorage.getItem(SESSION_EMAIL_KEY)||''}
function currentUserIsAdmin(){
  const u=getUsers().find(u=>u.email===currentUserEmail());
  return u?.isAdmin||false;
}
function isValidEmail(e){return/\S+@\S+\.\S+/.test(e)}

async function loginSubmit(){
  const email=(document.getElementById('login-email').value||'').trim().toLowerCase();
  const pw=document.getElementById('login-pw').value;
  const errEl=document.getElementById('login-err');
  const showErr=msg=>{errEl.textContent=msg;shakeLogin();setTimeout(()=>errEl.textContent='',3500)};

  if(!email||!pw){showErr('❌ أدخل الإيميل والباسورد');return}
  if(!isValidEmail(email)){showErr('❌ إيميل غير صحيح');return}

  const users=getUsers();

  // First-time setup: no users yet → accept any email + "admin" pw → create admin
  if(users.length===0){
    const h=await sha256(pw);
    if(h!==DEFAULT_ADMIN_HASH){showErr('❌ باسورد غلط — الباسورد الافتراضي: admin');document.getElementById('login-pw').value='';return}
    const newAdmin={email,hash:h,name:'Admin',isAdmin:true};
    saveUsers([newAdmin]);
    grantAccess(email,true);
    return;
  }

  const user=users.find(u=>u.email===email);
  if(!user){showErr('❌ الإيميل ده مش مضاف في النظام');document.getElementById('login-email').value='';return}

  const h=await sha256(pw);
  if(h!==user.hash){showErr('❌ باسورد غلط');document.getElementById('login-pw').value='';return}

  grantAccess(email,user.isAdmin);
}

function grantAccess(email,isAdmin){
  sessionStorage.setItem(SESSION_KEY,'1');
  sessionStorage.setItem(SESSION_EMAIL_KEY,email);
  document.getElementById('login-gate').classList.add('hidden');
  document.getElementById('login-pw').value='';
  document.getElementById('login-email').value='';
  if(isAdmin)document.getElementById('access-settings-btn').style.display='flex';
}

function toggleLoginEye(){
  const inp=document.getElementById('login-pw');
  inp.type=inp.type==='password'?'text':'password';
}
function shakeLogin(){
  const b=document.querySelector('.login-box');
  b.style.animation='none';b.offsetHeight;b.style.animation='shake .35s ease';
}

// ── ACCESS SETTINGS ──
async function openAccessSettings(){
  if(!isLoggedIn()){
    const pw=prompt('أدخل باسوردك للوصول للإعدادات:');
    if(!pw)return;
    const users=getUsers();
    if(users.length===0){
      const h=await sha256(pw);
      if(h!==DEFAULT_ADMIN_HASH){alert('❌ باسورد غلط');return}
    }else{
      // find any admin user and check their pw
      const h=await sha256(pw);
      const admin=users.find(u=>u.isAdmin&&u.hash===h);
      if(!admin){alert('❌ باسورد غلط');return}
    }
  }else if(!currentUserIsAdmin()){alert('⛔ بس الـ Admin يقدر يفتح الإعدادات');return}
  renderAccessSettings();
  document.getElementById('access-settings-overlay').classList.remove('hidden');
}
function closeAccessSettings(){document.getElementById('access-settings-overlay').classList.add('hidden')}

function renderAccessSettings(){
  const users=getUsers();
  const admins=users.filter(u=>u.isAdmin);
  const guests=users.filter(u=>!u.isAdmin);
  document.getElementById('access-settings-body').innerHTML=`
    <!-- Users list -->
    <div style="margin-bottom:20px">
      <div style="font-size:13px;font-weight:800;color:var(--p);margin-bottom:12px">👥 المستخدمين (${users.length})</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${users.length===0?`<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px;background:#f9fafb;border-radius:8px;border:1px dashed var(--brd)">لا يوجد مستخدمين بعد</div>`:
        users.map((u,i)=>`
          <div style="background:${u.isAdmin?'#f0fdf4':'#f9fafb'};border:1px solid ${u.isAdmin?'#c8e2d6':'#e5e7eb'};border-radius:10px;padding:12px 14px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
              <span style="font-size:16px">${u.isAdmin?'👑':'👤'}</span>
              <div style="flex:1">
                <div style="font-size:13px;font-weight:700;color:#111">${esc(u.name||u.email)}</div>
                <div style="font-size:11px;color:var(--muted)">${esc(u.email)} ${u.isAdmin?'<span style="background:#054930;color:#fff;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700">Admin</span>':''}</div>
              </div>
              ${!u.isAdmin?`<button onclick="removeUser('${u.email}')" style="background:#fee2e2;border:none;border-radius:7px;padding:4px 10px;color:#dc2626;font-size:12px;font-weight:700;cursor:pointer">حذف</button>`:''}
            </div>
            <div style="display:flex;gap:6px;align-items:center">
              <input type="password" id="pw-${i}" placeholder="باسورد جديد..." style="flex:1;border:1px solid var(--brd);border-radius:7px;padding:6px 10px;font-size:12px;font-family:inherit;outline:none">
              <button onclick="changeUserPw('${u.email}','${i}')" class="btn btn-xs" style="background:#054930;color:#fff;border:none;white-space:nowrap">تغيير الباسورد</button>
            </div>
          </div>`).join('')}
      </div>
    </div>

    <hr style="border:none;border-top:1px solid var(--brd);margin-bottom:20px">

    <!-- Add new user -->
    <div>
      <div style="font-size:13px;font-weight:800;color:var(--p);margin-bottom:10px">➕ إضافة مستخدم جديد</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <input id="as-new-name" type="text" placeholder="الاسم (اختياري)" style="border:1.5px solid var(--brd);border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;outline:none">
        <input id="as-new-email" type="email" placeholder="الإيميل *" style="border:1.5px solid var(--brd);border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;outline:none">
        <input id="as-new-pw" type="password" placeholder="الباسورد الخاص بيه *" style="border:1.5px solid var(--brd);border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;outline:none">
        <div style="font-size:11px;color:var(--muted)">⚠️ كل مستخدم بياسورد مختلف — لو حد شير credentials بتاعته، إنت بتغير باسورده بس</div>
        <button onclick="addUser()" class="btn btn-p btn-xs">＋ إضافة</button>
      </div>
    </div>`;
}

async function addUser(){
  const name=document.getElementById('as-new-name').value.trim();
  const email=document.getElementById('as-new-email').value.trim().toLowerCase();
  const pw=document.getElementById('as-new-pw').value;
  if(!email||!pw){alert('الإيميل والباسورد مطلوبين');return}
  if(!isValidEmail(email)){alert('إيميل غير صحيح');return}
  if(pw.length<4){alert('الباسورد لازم 4 حروف على الأقل');return}
  const users=getUsers();
  if(users.find(u=>u.email===email)){alert('الإيميل ده موجود بالفعل');return}
  const h=await sha256(pw);
  users.push({email,hash:h,name:name||email,isAdmin:false});
  saveUsers(users);
  document.getElementById('as-new-name').value='';
  document.getElementById('as-new-email').value='';
  document.getElementById('as-new-pw').value='';
  renderAccessSettings();
}

function removeUser(email){
  if(!confirm(`حذف ${email}؟`))return;
  saveUsers(getUsers().filter(u=>u.email!==email));
  renderAccessSettings();
}

async function changeUserPw(email,idx){
  const inp=document.getElementById('pw-'+idx);
  const pw=inp.value;
  if(!pw||pw.length<4){alert('الباسورد لازم 4 حروف على الأقل');return}
  const h=await sha256(pw);
  const users=getUsers();
  const u=users.find(u=>u.email===email);
  if(u){u.hash=h;saveUsers(users);inp.value='';alert(`✅ باسورد ${u.name||email} اتغير`)}
}
