<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Buying Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--p:#054930;--pd:#033320;--s:#0cb87d;--sd:#09a06b;--sl:#d4f5e9;--bg:#f0f4f2;--sur:#fff;--brd:#c8e2d6;--txt:#1a1a1a;--muted:#6b7280;--red:#ef4444;--redbg:#fee2e2}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:14px}

/* HEADER */
.hdr{background:var(--p);color:#fff;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(5,73,48,.35)}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr h1{font-size:18px;font-weight:800}
.hdr-sub{font-size:11px;opacity:.6;margin-top:1px}
.hdr-stats{display:flex;gap:28px}
.stat{text-align:center}
.stat-n{font-size:22px;font-weight:800;color:var(--s);line-height:1}
.stat-l{font-size:10px;opacity:.6;margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* TABS */
.tabs-bar{background:var(--pd);padding:0 24px;display:flex;align-items:stretch;gap:2px;overflow-x:auto;scrollbar-width:none;min-height:46px}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:0 20px;border:none;background:transparent;color:rgba(255,255,255,.55);cursor:grab;font-size:13px;font-weight:600;border-bottom:3px solid transparent;white-space:nowrap;transition:all .18s;display:flex;align-items:center;gap:8px;user-select:none}
.tab-btn:hover{color:#fff;background:rgba(255,255,255,.06)}
.tab-btn.active{color:var(--s);border-bottom-color:var(--s)}
.tab-btn.dragging{opacity:.35;background:rgba(255,255,255,.04)}
.tab-btn.drag-over{background:rgba(12,184,125,.18);border-bottom-color:var(--s);color:#fff}
.tab-count{background:rgba(255,255,255,.12);border-radius:10px;padding:1px 7px;font-size:11px}
.tab-btn.active .tab-count{background:rgba(12,184,125,.2);color:var(--s)}
.tab-x{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;flex-shrink:0}
.tab-btn:hover .tab-x{opacity:1}
.tab-x:hover{background:rgba(239,68,68,.4);color:#fff}
.add-tab-btn{padding:0 18px;background:transparent;border:none;color:var(--s);font-size:20px;cursor:pointer;font-weight:300;display:flex;align-items:center;transition:opacity .15s;flex-shrink:0}
.add-tab-btn:hover{opacity:.7}

/* SUB-TABS */
.sub-tabs{background:#fff;border-bottom:1px solid var(--brd);padding:0 28px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{padding:11px 16px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:12.5px;font-weight:600;border-bottom:2px solid transparent;transition:all .15s;display:flex;align-items:center;gap:6px;font-family:inherit;white-space:nowrap;flex-shrink:0}
.sub-tab:hover{color:var(--p)}
.sub-tab.active{color:var(--p);border-bottom-color:var(--s)}
.sub-tab{cursor:grab;user-select:none}
.sub-tab.dragging{opacity:.3}
.sub-tab.drag-over{border-left:3px solid var(--s);background:#f0fdf8;color:var(--p)}

/* MAIN */
.main{padding:24px 28px;max-width:1440px;margin:0 auto}

/* BUTTONS */
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;transition:all .15s;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
.btn-p{background:var(--s);color:#fff}.btn-p:hover{background:var(--sd)}
.btn-g{background:transparent;color:var(--muted);border:1.5px solid var(--brd)}.btn-g:hover{border-color:var(--s);color:var(--s)}
.btn-d{background:var(--redbg);color:var(--red)}.btn-d:hover{background:#fecaca}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-xs{padding:3px 9px;font-size:11px;border-radius:6px}

/* CARDS */
.card{background:var(--sur);border-radius:12px;border:.5px solid var(--brd);margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-body{padding:20px}

/* SECTION TITLE */
.sec-t{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--txt)}
.sec-t i{color:var(--s);font-size:18px}

/* FORMS */
.ctrl{display:flex;align-items:center;gap:12px;margin-bottom:1rem;flex-wrap:wrap}
.ctrl label{font-size:14px;color:#888;min-width:80px}
.ctrl input,.ctrl select{height:38px;font-size:14px;border:.5px solid var(--brd);border-radius:8px;padding:0 12px;background:#fff;color:var(--txt);font-family:inherit;transition:border-color .15s}
.ctrl input:focus,.ctrl select:focus{outline:none;border-color:var(--s);box-shadow:0 0 0 3px rgba(12,184,125,.12)}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{height:38px;padding:0 12px;width:100%;border:.5px solid var(--brd);border-radius:8px;font-size:14px;background:#fff;color:var(--txt);font-family:inherit;transition:border-color .15s}
.fg textarea{height:auto;padding:10px 12px;resize:vertical;min-height:70px}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--s);box-shadow:0 0 0 3px rgba(12,184,125,.12)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.span2{grid-column:1/-1}
.frow{margin-bottom:14px}
.ffoot{display:flex;gap:8px;justify-content:flex-end;padding-top:4px}

/* TASK FORM */
.task-panel{background:#f6fbf8;border:1.5px dashed var(--brd);border-radius:12px;padding:18px;margin-bottom:16px;animation:sd .2s ease}
@keyframes sd{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.task-panel h4{font-size:13px;font-weight:800;color:var(--p);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}

/* FILTERS */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.filter{padding:5px 14px;border:1.5px solid var(--brd);border-radius:20px;background:#fff;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);transition:all .15s;font-family:inherit}
.filter:hover{border-color:var(--s);color:var(--s)}
.filter.active{background:var(--s);border-color:var(--s);color:#fff}

/* TASK CARDS */
.tasks-list{display:flex;flex-direction:column;gap:10px}
.tc{background:#fff;border:1px solid var(--brd);border-radius:10px;padding:14px;display:grid;grid-template-columns:1fr auto;gap:12px;transition:box-shadow .15s,border-color .15s}
.tc:hover{box-shadow:0 2px 14px rgba(5,73,48,.08);border-color:#a8d5c0}
.tc.done{opacity:.6;background:#f8fbf9}
.tc.done .t-idea{text-decoration:line-through;color:var(--muted)}
.t-idea{font-size:14px;font-weight:700;margin-bottom:8px;line-height:1.4}
.tags{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.tag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.tf{background:#e6f4ee;color:var(--p)}
.tp{background:#fff3e0;color:#b45309}
.ts{background:#ede9fe;color:#5b21b6}
.td-tag{background:#fef9c3;color:#92400e}
.td-tag.ov{background:var(--redbg);color:var(--red)}
.t-ref a{color:var(--s);text-decoration:none;font-weight:700;font-size:11px}
.t-notes{margin-top:8px;font-size:12px;color:var(--muted);font-style:italic;padding:7px 10px;background:#f8f9fa;border-radius:6px;border-left:3px solid var(--brd)}
.t-ctrl{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.ss{padding:4px 8px;border:1.5px solid var(--brd);border-radius:7px;font-size:12px;font-weight:600;background:#fff;cursor:pointer;color:var(--txt);font-family:inherit;width:auto}

/* MEDIA PLAN */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px}
.mc{background:#f0f7f4;border-radius:8px;padding:1rem;border:1px solid var(--brd)}
.mc .lbl{font-size:12px;color:#888;margin-bottom:4px}
.mc .val{font-size:20px;font-weight:700;color:var(--p)}
.funnel-bar{display:flex;height:44px;border-radius:8px;overflow:hidden;margin-bottom:10px}
.funnel-bar div{display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;transition:width .3s}
.funnel-labels{display:flex;gap:16px;font-size:12px;color:#888;flex-wrap:wrap}
.funnel-labels span{display:flex;align-items:center;gap:6px}
.funnel-labels .dot,.plat-legend .dot{width:10px;height:10px;border-radius:2px;display:inline-block}
.tbl-wrap{overflow-x:auto;border:.5px solid var(--brd);border-radius:10px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f0f7f4;color:#888;font-weight:600;text-align:left;padding:12px;border-bottom:.5px solid var(--brd);white-space:nowrap}
td{padding:10px 12px;border-bottom:.5px solid var(--brd);vertical-align:middle}
tr:last-child td{border-bottom:none}
td input,td select{width:100%;height:34px;font-size:13px;border:.5px solid var(--brd);border-radius:8px;padding:0 8px;background:#fff;color:var(--txt);font-family:inherit}
td input:focus,td select:focus{outline:none;border-color:var(--s)}
.del-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:4px 8px;border-radius:6px}
.del-btn:hover{background:var(--redbg)}
.total-row{background:#f0f7f4;font-weight:600}
.total-row td{border-bottom:none}
.toggle-btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;padding:6px 14px;border:.5px solid var(--brd);border-radius:8px;cursor:pointer;background:none;color:var(--txt);transition:all .15s;font-family:inherit}
.toggle-btn:hover{background:var(--sl);color:var(--p)}
.toggle-btn.active{background:var(--s);color:#fff;border-color:var(--s)}
.toggles{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.add-btn{display:inline-flex;align-items:center;gap:6px;margin-top:14px;cursor:pointer;font-size:14px;background:none;border:.5px solid var(--brd);border-radius:8px;padding:8px 16px;color:var(--txt);font-family:inherit;transition:all .15s}
.add-btn:hover{background:var(--sl);border-color:var(--s);color:var(--p)}
.chart-wrap{position:relative;width:100%;height:280px;margin-top:1rem}
.plat-legend{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:#888;margin-bottom:8px}
.plat-legend span{display:flex;align-items:center;gap:4px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.kpi-card{background:#f0f7f4;border-radius:8px;padding:1rem;display:flex;flex-direction:column;gap:6px;border:1px solid var(--brd)}
.kpi-card .lbl{font-size:12px;color:#888}
.kpi-row{display:flex;align-items:center;gap:8px}
.rm-kpi{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:2px}
.kpi-input{width:120px;height:34px;font-size:14px;border:.5px solid var(--brd);border-radius:8px;padding:0 10px;background:#fff;color:var(--txt);text-align:center;font-weight:600;font-family:inherit}
.kpi-input:focus{outline:none;border-color:var(--s)}
.act-bar{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.act-bar button{background:#fff;border:.5px solid var(--brd);border-radius:8px;padding:10px 18px;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;color:var(--txt);transition:all .15s;font-family:inherit}
.act-bar button:hover{background:var(--sl);border-color:var(--s);color:var(--p)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;animation:fi .15s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:460px;box-shadow:0 24px 64px rgba(0,0,0,.22);animation:pi .2s ease}
@keyframes pi{from{opacity:0;transform:scale(.95) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal h3{font-size:18px;font-weight:800;color:var(--p);margin-bottom:18px}
.modal .fg{margin-bottom:12px}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.ei{font-size:36px;margin-bottom:10px}
.empty h3{font-size:16px;font-weight:700;margin-bottom:4px;color:var(--p)}

/* BRIEF CARDS */
.brief-list{display:flex;flex-direction:column;gap:14px}
.brief-card{background:#fff;border:1px solid var(--brd);border-radius:12px;overflow:hidden;transition:box-shadow .15s,border-color .15s}
.brief-card:hover{box-shadow:0 3px 16px rgba(5,73,48,.09);border-color:#a8d5c0}
.brief-hd{background:#f0f7f4;padding:13px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--brd)}
.brief-hd input{flex:1;border:none;background:transparent;font-size:15px;font-weight:700;color:var(--p);font-family:inherit;outline:none;min-width:0}
.brief-hd input::placeholder{color:#aaa;font-weight:400}
.brief-body{padding:18px;display:flex;flex-direction:column;gap:14px}
.brief-row{display:grid;gap:12px}
.brief-field{display:flex;flex-direction:column;gap:4px}
.brief-label{font-size:10px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.6px}
.brief-input{border:.5px solid var(--brd);border-radius:7px;padding:7px 11px;font-size:13px;font-family:inherit;background:#fff;color:var(--txt);width:100%;height:36px}
.brief-input:focus{outline:none;border-color:var(--s);box-shadow:0 0 0 2px rgba(12,184,125,.1)}
.brief-sel{border:.5px solid var(--brd);border-radius:7px;padding:7px 11px;font-size:13px;font-family:inherit;background:#fff;color:var(--txt);width:100%;height:36px}
.brief-sel:focus{outline:none;border-color:var(--s)}
.brief-ta{border:.5px solid var(--brd);border-radius:7px;padding:8px 11px;font-size:13px;font-family:inherit;background:#fff;color:var(--txt);width:100%;resize:vertical;min-height:64px}
.brief-ta:focus{outline:none;border-color:var(--s);box-shadow:0 0 0 2px rgba(12,184,125,.1)}
.brief-divider{border:none;border-top:1px dashed var(--brd);margin:0}
.preview-brief-btn{background:var(--p);color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit;transition:background .15s;white-space:nowrap}
.preview-brief-btn:hover{background:var(--pd)}

/* MY TASKS GLOBAL BTN */
.my-tasks-btn{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.8);padding:0 16px;border-radius:0;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;height:100%;transition:all .15s;white-space:nowrap;flex-shrink:0;border-right:1px solid rgba(255,255,255,.1)}
.my-tasks-btn:hover{background:rgba(255,255,255,.18);color:#fff}
.my-tasks-btn.active{background:var(--s);color:#fff}
.my-tasks-badge{background:rgba(255,255,255,.25);color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:800}
.my-tasks-btn.active .my-tasks-badge{background:rgba(255,255,255,.3)}
/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:start}
.k-col{background:#f4f6f5;border-radius:12px;overflow:hidden}
.k-col-hd{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:800}
.k-col-hd .k-count{font-size:11px;font-weight:700;border-radius:20px;padding:2px 9px}
.k-cards{padding:10px 10px 14px;display:flex;flex-direction:column;gap:8px;min-height:80px}
.k-card{background:#fff;border-radius:9px;border:1px solid var(--brd);border-left:3px solid;padding:12px 13px;transition:box-shadow .15s;cursor:default}
.k-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.09)}
.k-card.done-card{opacity:.55}
.k-card-title{font-size:13px;font-weight:700;color:var(--p);margin-bottom:7px;word-break:break-word}
.k-card-title.done-title{text-decoration:line-through;color:var(--muted)}
.k-card-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.k-tag{font-size:10px;font-weight:700;border-radius:10px;padding:2px 8px}
.k-card-notes{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:8px;white-space:pre-wrap}
.k-card-actions{display:flex;align-items:center;gap:5px}
.k-mv-btn{border:1px solid var(--brd);background:#fff;border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer;color:var(--muted);font-family:inherit;transition:all .12s}
.k-mv-btn:hover{border-color:var(--s);color:var(--s)}
/* TASK QUICK ADD */
.task-add-bar{background:#fff;border:1px solid var(--brd);border-radius:10px;padding:14px 16px;margin-bottom:18px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
.task-add-input{flex:1;min-width:200px;border:.5px solid var(--brd);border-radius:7px;padding:8px 12px;font-size:14px;font-family:inherit;background:#fff;color:var(--txt)}
.task-add-input:focus{outline:none;border-color:var(--s);box-shadow:0 0 0 2px rgba(12,184,125,.1)}
.task-add-sel{border:.5px solid var(--brd);border-radius:7px;padding:8px 10px;font-size:13px;font-family:inherit;background:#fff;color:var(--txt);height:36px}
.task-add-sel:focus{outline:none;border-color:var(--s)}

/* STRATEGY & DIRECTION SHARED */
.strat-section{background:#fff;border:1px solid var(--brd);border-radius:12px;overflow:hidden;margin-bottom:20px}
.strat-section-hd{background:#f0f7f4;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--brd)}
.strat-section-title{font-size:14px;font-weight:800;color:var(--p);display:flex;align-items:center;gap:8px}
.strat-section-body{padding:18px}
.strat-grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.strat-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.strat-input{border:.5px solid var(--brd);border-radius:7px;padding:7px 11px;font-size:13px;font-family:inherit;background:#fff;color:var(--txt);width:100%;height:36px}
.strat-input:focus{outline:none;border-color:var(--s);box-shadow:0 0 0 2px rgba(12,184,125,.1)}
.strat-sel{border:.5px solid var(--brd);border-radius:7px;padding:7px 11px;font-size:13px;font-family:inherit;background:#fff;color:var(--txt);width:100%;height:36px}
.strat-sel:focus{outline:none;border-color:var(--s)}
.strat-ta{border:.5px solid var(--brd);border-radius:7px;padding:8px 11px;font-size:13px;font-family:inherit;background:#fff;color:var(--txt);width:100%;resize:vertical;min-height:100px}
.strat-ta:focus{outline:none;border-color:var(--s);box-shadow:0 0 0 2px rgba(12,184,125,.1)}
.strat-label{font-size:10px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block}
.strat-field{display:flex;flex-direction:column}
/* USP list */
.usp-item{display:flex;align-items:flex-start;gap:8px;padding:10px 0;border-bottom:1px dashed var(--brd)}
.usp-item:last-child{border-bottom:none}
.usp-num{background:var(--s);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;margin-top:7px}
/* Angle cards */
.angle-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.angle-card{background:#f9fafb;border:1px solid var(--brd);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:10px}
.angle-card-hd{display:flex;align-items:center;gap:8px}
.angle-card-hd input{flex:1;border:none;background:transparent;font-size:14px;font-weight:700;color:var(--p);font-family:inherit;outline:none;min-width:0}
.angle-status{font-size:11px;font-weight:700;border-radius:20px;padding:3px 10px;border:none;cursor:pointer;font-family:inherit}
.angle-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
/* Hook list */
.hook-item{background:#f9fafb;border:1px solid var(--brd);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:8px}
.hook-item-hd{display:flex;align-items:center;gap:8px}
.hook-item-hd input{flex:1;border:none;background:transparent;font-size:13px;font-weight:700;color:var(--p);font-family:inherit;outline:none;min-width:0}
/* Direction list */
.dir-list{display:flex;flex-direction:column;gap:8px}
.dir-list-row{background:#fff;border:1px solid var(--brd);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s}
.dir-list-row:hover{border-color:#a8d5c0;box-shadow:0 2px 12px rgba(5,73,48,.08);transform:translateY(-1px)}
.dir-list-icon{width:36px;height:36px;background:linear-gradient(135deg,#054930,#0cb87d);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-size:16px}
.dir-list-name{font-size:15px;font-weight:700;color:var(--p);min-width:160px;flex-shrink:0}
.dir-list-meta{flex:1;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dir-badge{background:#f0f7f4;color:#054930;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;white-space:nowrap}
.dir-format-tag{background:#e0f2ec;color:var(--p);border-radius:10px;padding:2px 7px;font-size:10px;font-weight:700}
.dir-list-actions{display:flex;gap:6px;flex-shrink:0}
/* Direction modal */
.dir-modal-overlay{position:fixed;inset:0;background:rgba(5,30,20,.6);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.dir-modal-overlay.hidden{display:none}
.dir-modal-box{background:#fff;border-radius:16px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.35)}
.dir-modal-hd{background:linear-gradient(135deg,#054930,#076644);color:#fff;padding:22px 28px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;border-radius:16px 16px 0 0}
.dir-modal-hd input{flex:1;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:8px 14px;color:#fff;font-size:16px;font-weight:700;font-family:inherit;outline:none}
.dir-modal-hd input::placeholder{color:rgba(255,255,255,.5)}
.dir-modal-hd input:focus{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.6)}
.dir-modal-body{padding:24px 28px;display:flex;flex-direction:column;gap:14px}
.dir-field{display:flex;flex-direction:column;gap:4px}
.dir-label{font-size:10px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.5px}
.dir-sel{border:.5px solid var(--brd);border-radius:7px;padding:6px 10px;font-size:13px;font-family:inherit;background:#fff;color:var(--txt);width:100%;height:34px}
.dir-sel:focus{outline:none;border-color:var(--s)}
.dir-input{border:.5px solid var(--brd);border-radius:7px;padding:6px 10px;font-size:13px;font-family:inherit;background:#fff;color:var(--txt);width:100%;height:34px}
.dir-input:focus{outline:none;border-color:var(--s);box-shadow:0 0 0 2px rgba(12,184,125,.1)}
.dir-ta{border:.5px solid var(--brd);border-radius:7px;padding:8px 10px;font-size:13px;font-family:inherit;background:#fff;color:var(--txt);width:100%;resize:vertical;min-height:64px}
.dir-ta:focus{outline:none;border-color:var(--s);box-shadow:0 0 0 2px rgba(12,184,125,.1)}
.color-swatch{width:28px;height:28px;border-radius:6px;border:2px solid var(--brd);cursor:pointer;padding:0;flex-shrink:0}
.format-checks{display:flex;flex-wrap:wrap;gap:8px}
.format-check{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--txt);cursor:pointer}
.format-check input{accent-color:var(--s);width:14px;height:14px}

/* AUDIENCE CARDS */
.aud-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.aud-card{background:#fff;border:1px solid var(--brd);border-radius:12px;overflow:hidden;transition:box-shadow .15s,border-color .15s}
.aud-card:hover{box-shadow:0 3px 16px rgba(5,73,48,.09);border-color:#a8d5c0}
.aud-card-hd{background:#f0f7f4;padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--brd)}
.aud-card-hd input{flex:1;border:none;background:transparent;font-size:14px;font-weight:700;color:var(--p);font-family:inherit;outline:none;min-width:0}
.aud-card-hd input::placeholder{color:#aaa;font-weight:400}
.aud-card-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.aud-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.aud-field{display:flex;flex-direction:column;gap:4px}
.aud-label{font-size:10px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.5px}
.aud-input{border:.5px solid var(--brd);border-radius:7px;padding:6px 10px;font-size:13px;font-family:inherit;background:#fff;color:var(--txt);width:100%}
.aud-input:focus{outline:none;border-color:var(--s);box-shadow:0 0 0 2px rgba(12,184,125,.1)}
.aud-textarea{border:.5px solid var(--brd);border-radius:7px;padding:8px 10px;font-size:13px;font-family:inherit;background:#fff;color:var(--txt);width:100%;resize:vertical;min-height:60px}
.aud-textarea:focus{outline:none;border-color:var(--s);box-shadow:0 0 0 2px rgba(12,184,125,.1)}
.aud-select{border:.5px solid var(--brd);border-radius:7px;padding:6px 10px;font-size:13px;font-family:inherit;background:#fff;color:var(--txt);width:100%;height:34px}
.aud-select:focus{outline:none;border-color:var(--s)}
.status-active{background:#e6f4ee;color:#054930}
.status-paused{background:#fef3cd;color:#92400e}
.status-testing{background:#ede9fe;color:#5b21b6}
.aud-empty{text-align:center;padding:48px 20px;color:var(--muted);grid-column:1/-1}
.aud-empty .ei{font-size:40px;margin-bottom:10px}
.aud-empty h3{font-size:16px;font-weight:700;margin-bottom:4px;color:var(--p)}

/* SAVE INDICATOR */
.save-ind{font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;transition:all .3s;white-space:nowrap;margin-left:auto}
.save-ind.saving{color:var(--muted);background:transparent}
.save-ind.saved{color:var(--s);background:rgba(12,184,125,.12)}
.save-ind.unsaved{color:#f59e0b;background:rgba(245,158,11,.1)}

/* REPORT */
.rep-section{background:#fff;border-radius:12px;border:.5px solid var(--brd);margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.04);overflow:hidden}
.rep-sec-hd{background:var(--p);color:#fff;padding:12px 20px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:8px}
.rep-sec-hd i{color:var(--s);font-size:16px}
.rep-sec-body{padding:20px}
.rep-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:0}
.metric-tbl{width:100%;border-collapse:collapse;font-size:13px}
.metric-tbl th{background:#f0f7f4;color:#888;font-weight:600;text-align:left;padding:10px 12px;border-bottom:.5px solid var(--brd);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.metric-tbl td{padding:10px 12px;border-bottom:.5px solid var(--brd);vertical-align:middle}
.metric-tbl tr:last-child td{border-bottom:none}
.metric-tbl input{width:100%;border:.5px solid var(--brd);border-radius:7px;padding:6px 10px;font-size:13px;font-family:inherit;background:#fff}
.metric-tbl input:focus{outline:none;border-color:var(--s)}
.metric-tbl .del-btn{font-size:14px}
.status-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.pill-green{background:#e6f4ee;color:#054930}
.pill-red{background:#fee2e2;color:#ef4444}
.pill-grey{background:#f3f4f6;color:#6b7280}
.rep-preview-btn{background:var(--p);color:#fff;border:none;border-radius:10px;padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:inherit;transition:background .15s}
.rep-preview-btn:hover{background:var(--pd)}
.hidden{display:none!important}

@media(max-width:900px){.hdr-stats{display:none}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.main{padding:16px}.g2,.g3{grid-template-columns:1fr}.ctrl{flex-direction:column;align-items:stretch}}
</style>

<body>

<header class="hdr">
  <div class="hdr-l">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" opacity=".9"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <div><h1>Media Buying Dashboard</h1><div class="hdr-sub">Content Requests &amp; Media Planning</div></div>
  </div>
  <div class="hdr-stats">
    <div class="stat"><div class="stat-n" id="s-acc">0</div><div class="stat-l">Accounts</div></div>

    <div class="stat"><div class="stat-n" id="s-pend">0</div><div class="stat-l">Pending</div></div>
    <div class="stat"><div class="stat-n" id="s-done">0</div><div class="stat-l">Done</div></div>

</header>

<div class="tabs-bar" id="tabs-bar">
  <button class="my-tasks-btn" id="my-tasks-btn" onclick="openMyTasks()"><i class="ti ti-checkbox"></i> My Tasks <span class="my-tasks-badge" id="my-tasks-badge">0</span></button>
  <button class="add-tab-btn" id="add-tab-btn" title="Add Account">＋</button>
</div>

<div class="sub-tabs hidden" id="sub-tabs" style="align-items:center">
  <span class="save-ind hidden" id="save-ind"></span>
</div>

<main class="main" id="main"></main>

<!-- MODAL -->
<div class="overlay hidden" id="modal-add">
  <div class="modal">
    <h3>Add New Account</h3>
    <div class="fg"><label>Account Name *</label><input id="na-name" type="text" placeholder="e.g. Nike Egypt"/></div>
    <div class="fg"><label>Industry</label><input id="na-ind" type="text" placeholder="e.g. Sports &amp; Apparel"/></div>
    <div class="fg"><label>Primary Platform</label>
      <select id="na-plat">
        <option value="">Select Platform</option>
        <option>Facebook Ads</option><option>Google Ads</option><option>TikTok Ads</option>
        <option>Instagram</option><option>Snapchat Ads</option><option>LinkedIn Ads</option>
        <option>YouTube Ads</option><option>Twitter/X Ads</option><option>Multi-Platform</option>
      </select>
    </div>
    <div class="fg"><label>Monthly Budget</label><input id="na-bud" type="text" placeholder="e.g. 50,000 EGP"/></div>
    <div class="mfoot">
      <button class="btn btn-g" onclick="closeM()">Cancel</button>
      <button class="btn btn-p" onclick="addAcc()">Create Account</button>
    </div>
  </div>
</div>

<!-- DIRECTION MODAL -->
<div class="dir-modal-overlay hidden" id="dir-modal-overlay" onclick="closeDirModal(event)">
  <div class="dir-modal-box" onclick="event.stopPropagation()">
    <div id="dir-modal-content"></div>
  </div>
</div>

<script>
// ── CONSTANTS ──
const FC={awareness:'#7F77DD',consideration:'#0cb87d',conversion:'#054930',retention:'#EF9F27'};
const SL={awareness:'Awareness',consideration:'Consideration',conversion:'Conversion',retention:'Retention'};
const PC={'Meta':'#378ADD','Google Ads':'#1D9E75','TikTok':'#7F77DD','Snapchat':'#EF9F27','LinkedIn':'#0C447C','Twitter/X':'#555','YouTube':'#E24B4A','Other':'#888'};
const PLATS=Object.keys(PC);
const ADPLATS=['Facebook Ads','Instagram','TikTok Ads','Google Ads','Snapchat Ads','LinkedIn Ads','YouTube Ads','Twitter/X Ads'];
const GOALS=['Reach','Traffic','Engagement','Video views','Lead generation','Conversions','Purchase','App installs','Messages','Store traffic','Brand awareness','ROAS','Catalog sales','Website visits','Subscribers','Custom'];
const OCOLS=[
  {key:'goal',label:'Goal',def:true,type:'select',opts:GOALS},
  {key:'targeting',label:'Targeting',def:true},
  {key:'audience',label:'Audience',def:true},
  {key:'placement',label:'Placement',def:false},
  {key:'notes',label:'Notes',def:false}
];
let VC={};
OCOLS.forEach(c=>VC[c.key]=c.def);

const DCAMPS=()=>[
  {name:'TOF — Broad Awareness',platform:'Meta',stage:'awareness',pct:15,goal:'Reach',audience:'Broad 18-45',targeting:'Broad',placement:'',notes:''},
  {name:'TOF — Interest Targeting',platform:'Meta',stage:'awareness',pct:10,goal:'Video views',audience:'Interests',targeting:'Interest-based',placement:'',notes:''},
  {name:'MOF — Engagers',platform:'Meta',stage:'consideration',pct:15,goal:'Engagement',audience:'Engaged 7d',targeting:'Custom audience',placement:'',notes:''},
  {name:'MOF — Lookalike',platform:'Meta',stage:'consideration',pct:10,goal:'Traffic',audience:'LAL 1-3%',targeting:'Lookalike',placement:'',notes:''},
  {name:'BOF — Retargeting',platform:'Meta',stage:'conversion',pct:20,goal:'Purchase',audience:'ATC/VC 14d',targeting:'Custom audience',placement:'',notes:''},
  {name:'BOF — DPA Catalog',platform:'Meta',stage:'conversion',pct:10,goal:'Catalog sales',audience:'Catalog viewers',targeting:'DPA',placement:'',notes:''},
  {name:'Google — Search Brand',platform:'Google Ads',stage:'conversion',pct:10,goal:'Conversions',audience:'Brand keywords',targeting:'Search',placement:'',notes:''},
  {name:'Google — PMax',platform:'Google Ads',stage:'consideration',pct:10,goal:'Conversions',audience:'All signals',targeting:'PMax',placement:'',notes:''}
];

function dKPIs(obj,cur){
  const e=cur==='EGP';
  if(obj==='conversions')return[{label:'CPM',value:e?'45':'8',suffix:' '+cur},{label:'CTR',value:'1.2',suffix:'%'},{label:'CVR',value:'2.5',suffix:'%'},{label:'CPA',value:e?'150':'25',suffix:' '+cur},{label:'ROAS',value:'3.0',suffix:'x'}];
  if(obj==='leads')return[{label:'CPM',value:e?'35':'6',suffix:' '+cur},{label:'CTR',value:'1.5',suffix:'%'},{label:'Lead CVR',value:'8',suffix:'%'},{label:'CPL',value:e?'50':'8',suffix:' '+cur}];
  if(obj==='traffic')return[{label:'CPC',value:e?'3':'0.50',suffix:' '+cur},{label:'CTR',value:'2.0',suffix:'%'},{label:'Bounce rate',value:'45',suffix:'%'}];
  return[{label:'CPM',value:e?'25':'4',suffix:' '+cur},{label:'Reach',value:'500000',suffix:''},{label:'Frequency',value:'2.5',suffix:'x'}];
}

// ── SUB-TAB DEFINITIONS ──
const ALL_SUB_TABS=[
  {key:'tasks',  icon:'ti-clipboard-list', label:'Content Requests'},
  {key:'mp',     icon:'ti-chart-dots-3',   label:'Media Plan'},
  {key:'rep',    icon:'ti-file-analytics', label:'Client Report'},
  {key:'aud',    icon:'ti-users',          label:'Audiences'},
  {key:'brief',  icon:'ti-pencil',         label:'Creative Briefs'},
  {key:'strat',  icon:'ti-bulb',           label:'Creative Strategy'},
  {key:'dir',    icon:'ti-palette',        label:'Creative Direction'},
  {key:'atasks', icon:'ti-layout-kanban',  label:'Task Board'},
];
const DEFAULT_SUB_ORDER=ALL_SUB_TABS.map(t=>t.key);

// ── STATE ──
let db={accounts:[],active:null,myTasks:[],subTabOrder:[...DEFAULT_SUB_ORDER]};
let sub='tasks';
let addT=false;
let filt='all';
let chart=null;
let gview=null; // null | 'mytasks'
let dragAccId=null;
let dragSubKey=null;

function load(){try{const s=localStorage.getItem('mbd_v3');if(s)db=JSON.parse(s)}catch(e){}}
function save(){localStorage.setItem('mbd_v3',JSON.stringify(db))}

// ── AUTO-SAVE SYSTEM ──
let _st=null;

function flushDOM(){
  // Sync any unsaved DOM values into db before writing to localStorage
  const a=acct();if(!a)return;
  const g=id=>document.getElementById(id);
  if(sub==='rep'){
    if(g('rp-period'))  a.report.period       =g('rp-period').value;
    if(g('rp-by'))      a.report.preparedBy   =g('rp-by').value;
    if(g('rp-cur'))     a.report.currency      =g('rp-cur').value;
    if(g('rp-btot'))    a.report.budgetTotal   =g('rp-btot').value;
    if(g('rp-bspent'))  a.report.budgetSpent   =g('rp-bspent').value;
    if(g('rp-wins'))    a.report.wins          =g('rp-wins').value;
    if(g('rp-chal'))    a.report.challenges    =g('rp-chal').value;
    if(g('rp-rec'))     a.report.recommendations=g('rp-rec').value;
  }
  if(sub==='mp'){
    if(g('mp-client')) a.mediaPlan.clientName  =g('mp-client').value;
    if(g('mp-bud'))    a.mediaPlan.totalBudget =parseFloat(g('mp-bud').value)||0;
    if(g('mp-cur'))    a.mediaPlan.currency    =g('mp-cur').value;
    if(g('mp-dur'))    a.mediaPlan.duration    =g('mp-dur').value;
    if(g('mp-obj'))    a.mediaPlan.objective   =g('mp-obj').value;
  }
}

function showSaveInd(state,text){
  const el=document.getElementById('save-ind');if(!el)return;
  el.classList.remove('hidden','saving','saved','unsaved');
  el.classList.add(state);el.textContent=text;
  if(state==='saved')setTimeout(()=>{el.classList.add('hidden')},2500);
}

function queueSave(){
  showSaveInd('unsaved','● Unsaved');
  clearTimeout(_st);
  _st=setTimeout(()=>{
    showSaveInd('saving','Saving…');
    flushDOM();
    save();
    showSaveInd('saved','✓ Saved');
  },600);
}

// Save on every keystroke/input anywhere in the page
document.addEventListener('input',queueSave);
document.addEventListener('change',queueSave);

// Save before closing tab — never lose data
window.addEventListener('beforeunload',()=>{flushDOM();save()});

// Periodic save every 15 seconds as extra safety net
setInterval(()=>{flushDOM();save()},15000);
function acct(){return db.accounts.find(a=>a.id===db.active)||null}
function mp(){return acct()?.mediaPlan||{}}
function camps(){return mp().campaigns||[]}
function kpis(){return mp().kpis||[]}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function fmt(n){const el=document.getElementById('mp-cur');const c=el?el.value:(mp().currency||'EGP');return Math.round(n).toLocaleString('en')+' '+c}

// ── MODAL ──
function openM(){document.getElementById('modal-add').classList.remove('hidden')}
function closeM(){document.getElementById('modal-add').classList.add('hidden')}
document.getElementById('modal-add').addEventListener('click',function(e){if(e.target===this)closeM()});
document.getElementById('na-name').addEventListener('keydown',e=>{if(e.key==='Enter')addAcc()});
document.getElementById('add-tab-btn').onclick=()=>{
  ['na-name','na-ind','na-bud'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('na-plat').value='';
  openM();setTimeout(()=>document.getElementById('na-name').focus(),80);
};

// ── ACCOUNTS ──
function addAcc(){
  const name=document.getElementById('na-name').value.trim();
  if(!name){document.getElementById('na-name').focus();return}
  const cur='EGP',obj='conversions';
  const a={
    id:uid(),name,
    industry:document.getElementById('na-ind').value.trim(),
    platform:document.getElementById('na-plat').value,
    budget:document.getElementById('na-bud').value.trim(),
    tasks:[],
    mediaPlan:{clientName:name,totalBudget:30000,currency:cur,duration:'3',objective:obj,campaigns:DCAMPS(),kpis:dKPIs(obj,cur),logoBase64:null,logoAspect:1},
    report:{period:'',preparedBy:'',currency:cur,budgetTotal:'',budgetSpent:'',metrics:[],campaigns:[],topAds:[],campCols:defCampCols(),wins:'',challenges:'',recommendations:''},
    audiences:[],
    briefs:[],
    strategy:{usps:[],angles:[],hooks:[],testingPlan:'',funnelNotes:'',fatigueRules:'',winningPatterns:''},
    directions:[],
    acctTasks:[]
  };
  db.accounts.push(a);db.active=a.id;save();closeM();
  addT=false;sub='tasks';filt='all';killChart();render();
}

function delAcc(id){
  if(!confirm('Delete this account and all its data?'))return;
  if(db.active===id)killChart();
  db.accounts=db.accounts.filter(a=>a.id!==id);
  if(db.active===id)db.active=db.accounts[0]?.id||null;
  save();render();
}

function setAcc(id){
  if(db.active!==id)killChart();
  db.active=id;addT=false;sub='tasks';filt='all';gview=null;render();
}
function openMyTasks(){gview='mytasks';killChart();render()}

function switchSub(s){
  if(s!=='mp')killChart();
  sub=s;
  renderSubBar();
  renderMain();
  if(s==='mp')setTimeout(recalc,60);
}

function killChart(){if(chart){chart.destroy();chart=null}}

// ── TASKS ──
function togAddT(){addT=!addT;renderMain()}

function submitT(){
  const a=acct();if(!a)return;
  const idea=document.getElementById('tf-idea').value.trim();
  if(!idea){document.getElementById('tf-idea').focus();return}
  a.tasks.unshift({
    id:uid(),idea,
    segment:document.getElementById('tf-seg').value.trim(),
    refLink:document.getElementById('tf-ref').value.trim(),
    funnel:document.getElementById('tf-fun').value,
    platform:document.getElementById('tf-plat').value,
    deadline:document.getElementById('tf-dead').value,
    notes:document.getElementById('tf-notes').value.trim(),
    status:'pending',at:new Date().toISOString()
  });
  save();addT=false;renderMain();updStats();
}

function delT(aid,tid){
  const a=db.accounts.find(x=>x.id===aid);if(!a)return;
  a.tasks=a.tasks.filter(t=>t.id!==tid);
  save();renderMain();updStats();
}

function setTS(aid,tid,val){
  const a=db.accounts.find(x=>x.id===aid);if(!a)return;
  const t=a.tasks.find(x=>x.id===tid);if(!t)return;
  t.status=val;save();renderMain();updStats();
}

function setFilt(f){filt=f;renderMain()}

// ── MEDIA PLAN MUTATIONS ──
function saveMpS(){
  const a=acct();if(!a)return;
  a.mediaPlan.clientName=document.getElementById('mp-client').value;

function recalc(){
  const budEl=document.getElementById('mp-bud');if(!budEl)return;
  const total=parseFloat(budEl.value)||0;
  const dur=parseInt(document.getElementById('mp-dur').value)||1;
  const cs=camps();

  document.getElementById('mp-met').innerHTML=
    `<div class="mc"><div class="lbl">Total Budget</div><div class="val">${fmt(total)}</div></div>`+
    `<div class="mc"><div class="lbl">Monthly</div><div class="val">${fmt(total/dur)}</div></div>`+
    `<div class="mc"><div class="lbl">Daily</div><div class="val">${fmt(total/(dur*30))}</div></div>`+
    `<div class="mc"><div class="lbl">Campaigns</div><div class="val">${cs.length}</div></div>`;

  const stages={awareness:0,consideration:0,conversion:0,retention:0};
  cs.forEach(c=>stages[c.stage]=(stages[c.stage]||0)+c.pct);
  const totPct=cs.reduce((s,c)=>s+c.pct,0);

  let bH='',lH='';
  for(const s in stages){const p=stages[s];if(p>0){
    bH+=`<div style="width:${totPct?Math.round(p/totPct*100):0}%;background:${FC[s]}">${Math.round(p)}%</div>`;
    lH+=`<span><span class="dot" style="background:${FC[s]}"></span>${SL[s]} — ${Math.round(p)}% — ${fmt(total*p/100)}</span>`;
  }}
  document.getElementById('mp-fbar').innerHTML=bH;
  document.getElementById('mp-flbl').innerHTML=lH;

  renderToggs();renderTbl(total);renderChart(total);renderKPIs();
}

function renderToggs(){
  let h='';
  OCOLS.forEach(c=>{
    const a=VC[c.key];
    h+=`<button class="toggle-btn${a?' active':''}" onclick="togCol('${c.key}')"><i class="ti ti-${a?'eye':'eye-off'}"></i> ${c.label}</button>`;
  });
  document.getElementById('mp-toggs').innerHTML=h;
}

function renderTbl(total){
  const cs=camps();
  const head=document.getElementById('mp-thead');
  const tbody=document.getElementById('mp-tbody');
  let hh='<th>Campaign</th><th>Platform</th><th>Stage</th><th>%</th><th>Budget</th>';
  OCOLS.forEach(c=>{if(VC[c.key])hh+=`<th>${c.label}</th>`});
  hh+='<th></th>';
  head.innerHTML=hh;
  let h='';
  cs.forEach((c,i)=>{
    const amt=total*c.pct/100;
    h+='<tr>';
    h+=`<td><input value="${esc(c.name)}" onchange="setCF(${i},'name',this.value)"></td>`;
    h+=`<td><select onchange="setCF(${i},'platform',this.value)">${PLATS.map(p=>`<option value="${p}"${c.platform===p?' selected':''}>${p}</option>`).join('')}</select></td>`;
    h+=`<td><select onchange="setCF(${i},'stage',this.value)">${['awareness','consideration','conversion','retention'].map(s=>`<option value="${s}"${c.stage===s?' selected':''}>${SL[s]}</option>`).join('')}</select></td>`;
    h+=`<td><input type="number" value="${c.pct}" min="0" max="100" step="1" style="width:70px" onchange="setCF(${i},'pct',parseFloat(this.value)||0)"></td>`;
    h+=`<td style="font-weight:600;white-space:nowrap">${fmt(amt)}</td>`;
    OCOLS.forEach(col=>{
      if(VC[col.key]){
        if(col.type==='select'){
          h+=`<td><select onchange="setCF(${i},'${col.key}',this.value)">${col.opts.map(o=>`<option value="${esc(o)}"${c[col.key]===o?' selected':''}>${esc(o)}</option>`).join('')}</select></td>`;
        }else{
          h+=`<td><input value="${esc(c[col.key]||'')}" onchange="setCF(${i},'${col.key}',this.value)"></td>`;
        }
      }
    });
    h+=`<td style="text-align:center"><button class="del-btn" onclick="delCamp(${i})" title="Delete"><i class="ti ti-trash"></i></button></td>`;
    h+='</tr>';
  });
  const tPct=cs.reduce((s,c)=>s+c.pct,0);
  const visCnt=OCOLS.filter(c=>VC[c.key]).length;
  h+=`<tr class="total-row"><td>Total</td><td></td><td></td>`;
  h+=`<td style="color:${Math.round(tPct)===100?'#054930':'#ef4444'}">${Math.round(tPct)}%</td>`;
  h+=`<td>${fmt(total*tPct/100)}</td>`;
  for(let x=0;x<visCnt;x++)h+='<td></td>';
  h+='<td></td></tr>';
  tbody.innerHTML=h;
}

function renderChart(total){
  const cs=camps();
  const ctx=document.getElementById('mp-chart');if(!ctx)return;
  const labels=cs.map(c=>c.name);
  const data=cs.map(c=>Math.round(total*c.pct/100));
  const bg=cs.map(c=>PC[c.platform]||'#888');
  const used={};cs.forEach(c=>used[c.platform]=true);
  let leg='';
  for(const p in used)leg+=`<span><span class="dot" style="background:${PC[p]||'#888'}"></span>${p}</span>`;
  document.getElementById('mp-pleg').innerHTML=leg;
  killChart();
  chart=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[{data,backgroundColor:bg,borderRadius:4,barThickness:24}]},
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.raw)}}},
      scales:{
        x:{grid:{display:false},ticks:{color:'#888',callback:v=>Math.round(v).toLocaleString()}},
        y:{grid:{display:false},ticks:{color:'#444',font:{size:11}}}
      }
    }
  });
}

function renderKPIs(){
  const el=document.getElementById('mp-kpis');if(!el)return;
  let h='';
  kpis().forEach((k,i)=>{
    h+=`<div class="kpi-card"><div class="lbl">${esc(k.label)}</div><div class="kpi-row">
      <input class="kpi-input" value="${esc(k.value)}" onchange="upKPI(${i},this.value)">

function expCSV(){
  const total=parseFloat(document.getElementById('mp-bud').value)||0;
  const cur=document.getElementById('mp-cur').value;
  const hdr=['Campaign','Platform','Stage','%','Budget ('+cur+')'];
  OCOLS.forEach(c=>{if(VC[c.key])hdr.push(c.label)});
  const lines=[hdr.join(',')];
  camps().forEach(c=>{
    const row=['"'+c.name+'"',c.platform,c.stage,c.pct,Math.round(total*c.pct/100)];
    OCOLS.forEach(col=>{if(VC[col.key])row.push('"'+(c[col.key]||'')+'"')});
    lines.push(row.join(','));
  });
  lines.push('','Expected Results');
  kpis().forEach(k=>lines.push(k.label+','+k.value+k.suffix));
  const b=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='media_plan.csv';a.click();
}

function previewReport(){
  saveRep();
  const a=acct();if(!a)return;
  const r=a.report||{};
  const m=a.mediaPlan||{};
  const mets=r.metrics||[];
  const cps=r.campaigns||[];
  const cur=r.currency||'EGP';
  const tot=parseFloat(r.budgetTotal)||0;
  const spent=parseFloat(r.budgetSpent)||0;
  const rem=tot-spent;
  const pace=tot?Math.round(spent/tot*100):0;
  const paceColor=pace<=100?'#0cb87d':'#ef4444';
  const today=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});

  const logo=m.logoBase64?`<img src="${m.logoBase64}" style="height:48px;object-fit:contain;margin-bottom:12px">`:'' ;

  const metricsRows=mets.map(met=>{
    const g=parseFloat(met.goal),ac=parseFloat(met.actual);
    let status='—',sColor='#888';
    if(met.goal&&met.actual){
      const pct=Math.round((ac/g)*100);
      status=(ac>=g?'✓ ':'✗ ')+pct+'%';
      sColor=ac>=g?'#054930':'#ef4444';
    }
    return `<tr>
      <td style="padding:10px 14px;border-bottom:1px solid #e8f4ee;font-weight:600">${esc(met.name)}</td>
      <td style="padding:10px 14px;border-bottom:1px solid #e8f4ee;color:#666">${esc(met.goal)||'—'}</td>
      <td style="padding:10px 14px;border-bottom:1px solid #e8f4ee;font-weight:700;color:#054930">${esc(met.actual)||'—'}</td>
      <td style="padding:10px 14px;border-bottom:1px solid #e8f4ee;font-weight:700;color:${sColor}">${status}</td>
    </tr>`;
  }).join('');

  const visCols=CAMP_COLS.filter(col=>getCampCols()[col.key]);
  const campHead=visCols.map(col=>`<th style="background:#f0f7f4;color:#888;font-weight:700;text-align:left;padding:12px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #c8e2d6">${col.label}</th>`).join('');
  const campRows=cps.map(c=>`<tr>
    <td style="padding:10px 14px;border-bottom:1px solid #e8f4ee;font-weight:600">${esc(c.name)||'—'}</td>
    ${visCols.map(col=>{
      const v=c[col.key]||'';
      const isNum=['spend','impressions','clicks','conversions','reach','views'].includes(col.key);
      const isResult=col.key==='result';
      const disp=isNum&&v?Number(v).toLocaleString()+(col.key==='spend'?' '+cur:''):esc(v)||'—';
      return `<td style="padding:10px 14px;border-bottom:1px solid #e8f4ee;${isResult?'font-weight:600;color:#054930':''}${col.key==='notes'?'color:#666;font-size:12px':''}">${disp}</td>`;
    }).join('')}
  </tr>`).join('');
  const topAds=r.topAds||[];

  const insightBlock=(icon,title,text,bg)=>text?`
    <div style="background:${bg};border-radius:10px;padding:18px;flex:1;min-width:200px">
      <div style="font-size:13px;font-weight:800;color:#054930;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">${icon} ${title}</div>
      <div style="font-size:13px;color:#444;line-height:1.7;white-space:pre-wrap">${esc(text)}</div>
    </div>`:'';

  const html=`<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Report — ${esc(a.name)} — ${esc(r.period||today)}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

tbl{width:100%;border-collapse:collapse}

</style></head><body>
<div class="no-print" style="position:fixed;top:0;left:0;right:0;background:#054930;color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;z-index:99;font-size:13px;font-weight:600">
  <span>📄 Report Preview</span>
  <div style="display:flex;gap:10px">
    <button onclick="window.print()" style="background:#0cb87d;color:#fff;border:none;border-radius:7px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer">🖨️ Print / Save PDF</button>
    <button onclick="window.close()" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:7px;padding:8px 14px;font-size:13px;cursor:pointer">✕ Close</button>

</div>
<div style="height:52px" class="no-print"></div>
<div class="page">

  <!-- COVER -->
  <div class="cover">

    <div class="meta">
      ${r.preparedBy?`<div class="meta-item"><strong>Prepared by</strong>${esc(r.preparedBy)}</div>`:''}

      ${m.objective?`<div class="meta-item"><strong>Objective</strong>${esc(m.objective)}</div>`:''}
    </div>
  </div>

  <!-- BUDGET OVERVIEW -->
  ${tot>0?`<div class="sec">
    <div class="sec-title">💰 Budget Overview</div>
    <div class="kpi-grid">
      <div class="kpi-box"><div class="lbl">Total Budget</div><div class="val">${tot.toLocaleString()} ${cur}</div></div>
      <div class="kpi-box"><div class="lbl">Amount Spent</div><div class="val">${spent.toLocaleString()} ${cur}</div></div>
      <div class="kpi-box"><div class="lbl">Remaining</div><div class="val">${rem.toLocaleString()} ${cur}</div></div>
      <div class="kpi-box"><div class="lbl">Budget Used</div><div class="val" style="color:${paceColor}">${pace}%</div></div>
    </div>
    <div style="margin-top:16px">
      <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:#888;margin-bottom:6px"><span>Pacing</span><span style="color:${paceColor}">Spent ${pace}% of total</span></div>
      <div class="pacing-bar"><div class="pacing-fill" style="width:${Math.min(pace,100)}%;background:${paceColor}"></div></div>
    </div>
  </div>`:''}

  <!-- KEY METRICS -->
  ${mets.length>0?`<div class="sec">
    <div class="sec-title">📊 Key Metrics — Planned vs. Actual</div>
    <table>
      <thead><tr><th>Metric</th><th>Goal</th><th>Actual</th><th>Status</th></tr></thead>
      <tbody>${metricsRows}</tbody>
    </table>
  </div>`:''}

  <!-- CAMPAIGN PERFORMANCE -->
  ${cps.length>0?`<div class="sec">
    <div class="sec-title">🎯 Campaign Performance</div>
    <table>
      <thead><tr>
        <th style="background:#f0f7f4;color:#888;font-weight:700;text-align:left;padding:12px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #c8e2d6">Campaign</th>
        ${campHead}
      </tr></thead>
      <tbody>${campRows}</tbody>

  </div>`:''}

  <!-- TOP ADS -->
  ${topAds.length>0?`<div class="sec">
    <div class="sec-title">⭐ Top Performing Ads</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px">
      ${topAds.map((ad,i)=>`
      <div style="background:#f6fbf8;border-radius:12px;padding:18px;border:1px solid #c8e2d6;position:relative">
        <div style="position:absolute;top:12px;right:14px;display:flex;gap:6px;flex-wrap:wrap">

</div>
</body></html>`;

  const w=window.open('','_blank');

// ── AUDIENCES ──
let audFilter='all';

function addAud(){
  const a=acct();if(!a)return;
  a.audiences.unshift({id:uid(),name:'',type:'',platform:'',funnel:'',source:'',definition:'',perfNotes:'',status:'active'});
  save();renderMain();
}
function delAud(id){
  const a=acct();if(!a)return;
  a.audiences=a.audiences.filter(x=>x.id!==id);
  save();renderMain();
}
function updAud(id,field,val){
  const a=acct();if(!a)return;
  const aud=a.audiences.find(x=>x.id===id);if(!aud)return;
  aud[field]=val;save();
}
function setAudFilter(f){audFilter=f;renderMain()}

function renderAud(main,a){
  const auds=audFilter==='all'?a.audiences:a.audiences.filter(x=>x.status===audFilter);
  const cnt=s=>a.audiences.filter(x=>x.status===s).length;

  main.innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:18px">
    <div>
      <div style="font-size:22px;font-weight:800;color:var(--p)">${esc(a.name)} — Audiences</div>
      <div style="font-size:13px;color:var(--muted);margin-top:3px">${a.audiences.length} audience${a.audiences.length!==1?'s':''} saved</div>
    </div>
    <button class="btn btn-p btn-sm" onclick="addAud()">＋ New Audience</button>
  </div>

  <div class="filters" style="margin-bottom:20px">
    <button class="filter${audFilter==='all'?' active':''}" onclick="setAudFilter('all')">All (${a.audiences.length})</button>
    <button class="filter${audFilter==='active'?' active':''}" onclick="setAudFilter('active')">🟢 Active (${cnt('active')})</button>
    <button class="filter${audFilter==='testing'?' active':''}" onclick="setAudFilter('testing')">🧪 Testing (${cnt('testing')})</button>
    <button class="filter${audFilter==='paused'?' active':''}" onclick="setAudFilter('paused')">⏸ Paused (${cnt('paused')})</button>
  </div>

  <div class="aud-grid">
    ${auds.length===0?`
      <div class="aud-empty">
        <div class="ei">🎯</div>
        <h3>${a.audiences.length===0?'No audiences yet':'No matches'}</h3>
        <p>${a.audiences.length===0?'Add your first audience or targeting segment above.':'Try a different filter.'}</p>
      </div>`
    :auds.map(aud=>`
      <div class="aud-card">
        <div class="aud-card-hd">
          <input value="${esc(aud.name)}" placeholder="Audience name..." oninput="updAud('${aud.id}','name',this.value)"/>
          <select class="aud-select" style="width:auto;flex-shrink:0" oninput="updAud('${aud.id}','status',this.value)">
            <option value="active"${aud.status==='active'?' selected':''}>🟢 Active</option>
            <option value="testing"${aud.status==='testing'?' selected':''}>🧪 Testing</option>
            <option value="paused"${aud.status==='paused'?' selected':''}>⏸ Paused</option>
          </select>
        </div>
        <div class="aud-card-body">
          <div class="aud-row">
            <div class="aud-field">
              <div class="aud-label">Type</div>
              <select class="aud-select" oninput="updAud('${aud.id}','type',this.value)">
                <option value="">Select type</option>
                ${['Custom Audience','Lookalike','Interest-Based','Broad','Saved Audience','Retargeting'].map(t=>`<option value="${t}"${aud.type===t?' selected':''}>${t}</option>`).join('')}
              </select>
            </div>
            <div class="aud-field">
              <div class="aud-label">Platform</div>
              <select class="aud-select" oninput="updAud('${aud.id}','platform',this.value)">
                <option value="">Select platform</option>
                ${ADPLATS.map(p=>`<option value="${p}"${aud.platform===p?' selected':''}>${p}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="aud-row">
            <div class="aud-field">
              <div class="aud-label">Funnel Stage</div>
              <select class="aud-select" oninput="updAud('${aud.id}','funnel',this.value)">
                <option value="">Select stage</option>
                ${['TOFU — Awareness','MOFU — Consideration','BOFU — Conversion','Retention'].map(f=>`<option value="${f}"${aud.funnel===f?' selected':''}>${f}</option>`).join('')}
              </select>
            </div>
            <div class="aud-field">
              <div class="aud-label">Source</div>
              <select class="aud-select" oninput="updAud('${aud.id}','source',this.value)">
                <option value="">Select source</option>
                ${['Website Visitors','Customer List','Video Viewers','Page Engagers','App Users','Lookalike Seed','Manual / Interest'].map(s=>`<option value="${s}"${aud.source===s?' selected':''}>${s}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="aud-field">
            <div class="aud-label">Definition — Age, Gender, Location, Interests, Behaviors</div>
            <textarea class="aud-textarea" placeholder="e.g. Women 25–44, Cairo & Giza, interested in fitness & wellness, exclude current customers..." oninput="updAud('${aud.id}','definition',this.value)">${esc(aud.definition)}</textarea>
          </div>
          <div class="aud-field">
            <div class="aud-label">Performance Notes — CPM, CTR, Results, Observations</div>
            <textarea class="aud-textarea" placeholder="e.g. CPM 38 EGP, CTR 1.8%, best performer for BOFU retargeting, ROAS 4.1x..." oninput="updAud('${aud.id}','perfNotes',this.value)">${esc(aud.perfNotes)}</textarea>
          </div>
          <div style="display:flex;justify-content:flex-end">

        </div>
      </div>`).join('')}
  </div>`;
}

function addBrief(){

  a.briefs.unshift({
    id:uid(),campaignName:'',platform:'',adType:'',format:'',duration:'',deadline:'',
    objective:'',targetAudience:'',keyMessage:'',hook:'',cta:'',

    status:'draft',createdAt:new Date().toISOString()
  });

}
function delBrief(id){const a=acct();if(!a)return;a.briefs=a.briefs.filter(x=>x.id!==id);save();renderMain()}
function updBrief(id,field,val){const a=acct();if(!a)return;const b=a.briefs.find(x=>x.id===id);if(b){b[field]=val;save()}}

    <div class="brief-body">

      <div class="brief-row" style="grid-template-columns:1fr 1fr 1fr 1fr 1fr">
        <div class="brief-field"><div class="brief-label">Platform</div>
          <select class="brief-sel" oninput="updBrief('${b.id}','platform',this.value)">
            <option value="">Select</option>

        </div>

        </div>
        <div class="brief-field"><div class="brief-label">Format / Dimensions</div>
          <select class="brief-sel" oninput="updBrief('${b.id}','format',this.value)">
            <option value="">Select</option>
            ${formats.map(f=>`<option value="${f}"${b.format===f?' selected':''}>${f}</option>`).join('')}

        </div>
        <div class="brief-field"><div class="brief-label">Duration (Video)</div>
          <select class="brief-sel" oninput="updBrief('${b.id}','duration',this.value)">
            <option value="">N/A</option>
            ${durations.map(d=>`<option value="${d}"${b.duration===d?' selected':''}>${d}</option>`).join('')}
          </select>
        </div>
        <div class="brief-field"><div class="brief-label">Deadline</div>
          <input type="date" class="brief-input" value="${esc(b.deadline)}" oninput="updBrief('${b.id}','deadline',this.value)"/>
        </div>
      </div>

      <hr class="brief-divider"/>

      <div class="brief-row" style="grid-template-columns:1fr 1fr">
        <div class="brief-field"><div class="brief-label">Objective</div>
          <select class="brief-sel" oninput="updBrief('${b.id}','objective',this.value)">
            <option value="">Select</option>
            ${objectives.map(o=>`<option value="${o}"${b.objective===o?' selected':''}>${o}</option>`).join('')}
          </select>
        </div>
        <div class="brief-field"><div class="brief-label">Tone & Style</div>
          <select class="brief-sel" oninput="updBrief('${b.id}','tone',this.value)">
            <option value="">Select</option>
            ${tones.map(t=>`<option value="${t}"${b.tone===t?' selected':''}>${t}</option>`).join('')}
          </select>
        </div>
      </div>

      <div class="brief-field">
        <div class="brief-label">Target Audience — Who will see this ad?</div>
        <input class="brief-input" value="${esc(b.targetAudience)}" placeholder="e.g. Women 25–40, Cairo, interested in skincare, retargeting website visitors" oninput="updBrief('${b.id}','targetAudience',this.value)"/>
      </div>

      <div class="brief-field">
        <div class="brief-label">Key Message — What's the ONE thing they should understand?</div>
        <input class="brief-input" value="${esc(b.keyMessage)}" placeholder="e.g. Our product solves X problem 3x faster than competitors" oninput="updBrief('${b.id}','keyMessage',this.value)"/>
      </div>

      <div class="brief-row" style="grid-template-columns:1fr 1fr">
        <div class="brief-field">
          <div class="brief-label">Hook — First 3 seconds</div>
          <textarea class="brief-ta" placeholder="e.g. Open with a bold question: 'Still wasting money on ads that don't convert?'" oninput="updBrief('${b.id}','hook',this.value)">${esc(b.hook)}</textarea>
        </div>
        <div class="brief-field">
          <div class="brief-label">CTA — Call to Action</div>
          <textarea class="brief-ta" placeholder="e.g. 'Shop Now' button → product page. Mention limited offer in last 3 seconds." oninput="updBrief('${b.id}','cta',this.value)">${esc(b.cta)}</textarea>
        </div>
      </div>

      <hr class="brief-divider"/>

      <div class="brief-row" style="grid-template-columns:1fr 1fr">
        <div class="brief-field">
          <div class="brief-label">✅ Do's — Must Include</div>
          <textarea class="brief-ta" placeholder="- Show product in use&#10;- Include social proof&#10;- Arabic subtitles&#10;- Brand colors only" oninput="updBrief('${b.id}','dos',this.value)">${esc(b.dos)}</textarea>
        </div>
        <div class="brief-field">
          <div class="brief-label">🚫 Don'ts — Must Avoid</div>
          <textarea class="brief-ta" placeholder="- No competitor mentions&#10;- No white backgrounds&#10;- No text-heavy visuals&#10;- No stock footage" oninput="updBrief('${b.id}','donts',this.value)">${esc(b.donts)}</textarea>
        </div>
      </div>

      <div class="brief-field">
        <div class="brief-label">Reference Ads — Links or descriptions of similar ads for inspiration</div>
        <textarea class="brief-ta" style="min-height:50px" placeholder="https://... or describe: 'Similar to Nike's Run Club ad — fast cuts, upbeat music, product shots'" oninput="updBrief('${b.id}','references',this.value)">${esc(b.references)}</textarea>
      </div>

      <div class="brief-field">
        <div class="brief-label">Additional Notes</div>
        <textarea class="brief-ta" style="min-height:50px" placeholder="Any extra context, brand guidelines, file format requirements..." oninput="updBrief('${b.id}','notes',this.value)">${esc(b.notes)}</textarea>
      </div>

    </div>
  </div>`;
}

      ${b.deadline?`<span style="background:rgba(239,68,68,.3);border:1px solid rgba(239,68,68,.4);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700">📅 Deadline: ${dl}</span>`:''}

// ── CREATIVE STRATEGY ──
const ANGLE_TYPES=['Problem / Solution','Social Proof','Before & After','Fear / Risk','FOMO / Urgency','Humor','Educational','Testimonial','How It Works','Comparison','UGC / Raw','Seasonal'];
const ANGLE_STATUS=[
  {val:'to-test',label:'🧪 To Test',bg:'#ede9fe',color:'#5b21b6'},
  {val:'testing',label:'⏳ Testing',bg:'#fef3c7',color:'#92400e'},
  {val:'winner',label:'🏆 Winner',bg:'#d1fae5',color:'#065f46'},
  {val:'loser',label:'❌ Loser',bg:'#fee2e2',color:'#991b1b'},
  {val:'paused',label:'⏸ Paused',bg:'#f3f4f6',color:'#6b7280'}
];
const HOOK_STATUS=[
  {val:'to-test',label:'🧪 To Test',bg:'#ede9fe',color:'#5b21b6'},
  {val:'tested',label:'✅ Tested',bg:'#d1fae5',color:'#065f46'},
  {val:'top',label:'🔥 Top Hook',bg:'#fef3c7',color:'#92400e'}
];
const FORMATS=['1:1 (Square)','9:16 (Story/Reel)','16:9 (Landscape)','4:5 (Portrait)','2:3','1.91:1 (Feed)'];
const VIS_STYLES=['Lifestyle / Real People','UGC / Raw','Minimal / Clean','Bold / High Contrast','Animated / Motion Graphics','Testimonial / Talking Head','Product Demo','Before & After','Text-Forward','Documentary Style'];

function strat(){const a=acct();return a?a.strategy:null}

function addUSP(){const a=acct();if(!a)return;a.strategy.usps.push({id:uid(),text:'',notes:''});save();renderMain()}
function delUSP(id){const a=acct();if(!a)return;a.strategy.usps=a.strategy.usps.filter(x=>x.id!==id);save();renderMain()}
function updUSP(id,f,v){const s=strat();if(!s)return;const u=s.usps.find(x=>x.id===id);if(u){u[f]=v;save()}}

function addAngle(){const a=acct();if(!a)return;a.strategy.angles.unshift({id:uid(),name:'',angleType:'',hypothesis:'',funnel:'',status:'to-test',notes:''});save();renderMain()}
function delAngle(id){const a=acct();if(!a)return;a.strategy.angles=a.strategy.angles.filter(x=>x.id!==id);save();renderMain()}
function updAngle(id,f,v){const s=strat();if(!s)return;const u=s.angles.find(x=>x.id===id);if(u){u[f]=v;save();if(f==='status')renderMain()}}

function addHook(){const a=acct();if(!a)return;a.strategy.hooks.unshift({id:uid(),formula:'',example:'',funnel:'',status:'to-test'});save();renderMain()}
function delHook(id){const a=acct();if(!a)return;a.strategy.hooks=a.strategy.hooks.filter(x=>x.id!==id);save();renderMain()}
function updHook(id,f,v){const s=strat();if(!s)return;const u=s.hooks.find(x=>x.id===id);if(u){u[f]=v;save();if(f==='status')renderMain()}}

function updStratField(f,v){const s=strat();if(!s)return;s[f]=v;save()}

function renderStrategy(main,a){
  const s=a.strategy;
  const angleStatusBadge=st=>{const o=ANGLE_STATUS.find(x=>x.val===st)||ANGLE_STATUS[0];return `<span style="background:${o.bg};color:${o.color};font-size:11px;font-weight:700;border-radius:20px;padding:3px 10px">${o.label}</span>`};
  const hookStatusBadge=st=>{const o=HOOK_STATUS.find(x=>x.val===st)||HOOK_STATUS[0];return `<span style="background:${o.bg};color:${o.color};font-size:11px;font-weight:700;border-radius:20px;padding:3px 10px">${o.label}</span>`};

  main.innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:20px">
    <div>
      <div style="font-size:22px;font-weight:800;color:var(--p)">${esc(a.name)} — Creative Strategy</div>
      <div style="font-size:13px;color:var(--muted);margin-top:2px">${s.angles.length} angles · ${s.hooks.length} hooks · ${s.usps.length} USPs</div>
    </div>
    <button class="btn btn-p btn-sm" onclick="exportStrategyPDF()" style="display:flex;align-items:center;gap:6px"><i class="ti ti-file-export"></i> Export PDF</button>
  </div>

  <!-- USPs -->
  <div class="strat-section">
    <div class="strat-section-hd">
      <div class="strat-section-title">🎯 Unique Selling Points (USPs)</div>
      <button class="btn btn-p btn-xs" onclick="addUSP()">＋ Add USP</button>
    </div>
    <div class="strat-section-body" style="padding:${s.usps.length?'12px 18px':'18px'}">
      ${s.usps.length===0?`<div style="color:var(--muted);font-size:13px;text-align:center;padding:10px 0">أضف أهم مميزات المنتج أو الخدمة هنا</div>`
      :s.usps.map((u,i)=>`
        <div class="usp-item">
          <div class="usp-num">${i+1}</div>
          <div style="flex:1;display:flex;flex-direction:column;gap:6px">
            <input class="strat-input" value="${esc(u.text)}" placeholder="e.g. Fastest delivery in Egypt — same day guaranteed" oninput="updUSP('${u.id}','text',this.value)"/>
            <input class="strat-input" style="font-size:12px;color:var(--muted)" value="${esc(u.notes)}" placeholder="Notes / proof points (stats, testimonials, data...)" oninput="updUSP('${u.id}','notes',this.value)"/>
          </div>
          <button class="btn btn-d btn-xs" style="margin-top:4px" onclick="delUSP('${u.id}')"><i class="ti ti-trash"></i></button>
        </div>`).join('')}
    </div>
  </div>

  <!-- Ad Angles -->
  <div class="strat-section">
    <div class="strat-section-hd">
      <div class="strat-section-title">💡 Ad Angles</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:var(--muted)">${s.angles.filter(x=>x.status==='winner').length} winner${s.angles.filter(x=>x.status==='winner').length!==1?'s':''}</span>
        <button class="btn btn-p btn-xs" onclick="addAngle()">＋ Add Angle</button>
      </div>
    </div>
    <div class="strat-section-body">
      ${s.angles.length===0?`<div style="color:var(--muted);font-size:13px;text-align:center;padding:10px 0">ابدأ بإضافة الـ angles اللي عايز تختبرها</div>`
      :`<div class="angle-grid">${s.angles.map(ang=>{
        const st=ANGLE_STATUS.find(x=>x.val===ang.status)||ANGLE_STATUS[0];
        return `<div class="angle-card" style="border-color:${ang.status==='winner'?'#0cb87d':ang.status==='loser'?'#fca5a5':'var(--brd)'}">
          <div class="angle-card-hd">
            <input value="${esc(ang.name)}" placeholder="Angle name..." oninput="updAngle('${ang.id}','name',this.value)"/>
            <select style="background:${st.bg};color:${st.color};border:none;border-radius:20px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit" oninput="updAngle('${ang.id}','status',this.value)">
              ${ANGLE_STATUS.map(o=>`<option value="${o.val}"${ang.status===o.val?' selected':''}>${o.label}</option>`).join('')}
            </select>
            <button class="btn btn-d btn-xs" onclick="delAngle('${ang.id}')"><i class="ti ti-trash"></i></button>
          </div>
          <div class="angle-row">
            <div class="strat-field">
              <span class="strat-label">Type</span>
              <select class="strat-sel" oninput="updAngle('${ang.id}','angleType',this.value)">
                <option value="">Select type</option>
                ${ANGLE_TYPES.map(t=>`<option value="${t}"${ang.angleType===t?' selected':''}>${t}</option>`).join('')}
              </select>
            </div>
            <div class="strat-field">
              <span class="strat-label">Funnel Stage</span>
              <select class="strat-sel" oninput="updAngle('${ang.id}','funnel',this.value)">
                <option value="">Select</option>
                ${['TOFU — Awareness','MOFU — Consideration','BOFU — Conversion','Retention'].map(f=>`<option value="${f}"${ang.funnel===f?' selected':''}>${f}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="strat-field">
            <span class="strat-label">Hypothesis — Why should this angle work?</span>
            <textarea class="strat-ta" style="min-height:58px" placeholder="e.g. Our audience struggles with X, so leading with that pain point before the offer should trigger recognition..." oninput="updAngle('${ang.id}','hypothesis',this.value)">${esc(ang.hypothesis)}</textarea>
          </div>
          <div class="strat-field">
            <span class="strat-label">Notes / Results</span>
            <textarea class="strat-ta" style="min-height:44px" placeholder="Test results, what worked, what to tweak..." oninput="updAngle('${ang.id}','notes',this.value)">${esc(ang.notes)}</textarea>
          </div>
        </div>`}).join('')}</div>`}
    </div>
  </div>

  <!-- Hook Formulas -->
  <div class="strat-section">
    <div class="strat-section-hd">
      <div class="strat-section-title">🎣 Hook Formulas (First 3 Seconds)</div>
      <button class="btn btn-p btn-xs" onclick="addHook()">＋ Add Hook</button>
    </div>
    <div class="strat-section-body" style="display:flex;flex-direction:column;gap:10px">
      ${s.hooks.length===0?`<div style="color:var(--muted);font-size:13px;text-align:center;padding:10px 0">أضف الـ hooks اللي بتجذب attention الـ audience ده</div>`
      :s.hooks.map(h=>{
        const hst=HOOK_STATUS.find(x=>x.val===h.status)||HOOK_STATUS[0];
        return `<div class="hook-item">
          <div class="hook-item-hd">
            <i class="ti ti-fish-hook" style="color:var(--s);flex-shrink:0"></i>
