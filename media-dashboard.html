// ── CREATIVE DIRECTION ──
const DIR_TONES=['Professional','Fun & Energetic','Emotional','Urgent','Inspirational','Conversational','Bold & Direct'];

function addDirection(){
  const a=acct();if(!a)return;
  const d={id:uid(),name:'',visualStyle:'',colorNotes:'',colors:['#054930','#0cb87d','#ffffff'],
    typography:'',mood:'',talentNotes:'',music:'',formats:[],references:'',notes:'',createdAt:new Date().toISOString()};
  a.directions.unshift(d);
  save();renderMain();
  openDirModal(d.id);
}
function delDirection(id,e){
  if(e)e.stopPropagation();
  const a=acct();if(!a)return;
  a.directions=a.directions.filter(x=>x.id!==id);
  save();closeDirModal(null,true);renderMain();
}
function updDir(id,f,v){const a=acct();if(!a)return;const d=a.directions.find(x=>x.id===id);if(d){d[f]=v;save();refreshDirListRow(id)}}
function togDirFormat(id,fmt){
  const a=acct();if(!a)return;
  const d=a.directions.find(x=>x.id===id);if(!d)return;
  if(!d.formats)d.formats=[];
  const i=d.formats.indexOf(fmt);
  if(i===-1)d.formats.push(fmt);else d.formats.splice(i,1);
  save();refreshDirListRow(id);
}
function refreshDirListRow(id){
  const a=acct();if(!a)return;
  const d=a.directions.find(x=>x.id===id);if(!d)return;
  const row=document.getElementById('dlr-'+id);
  if(row)row.outerHTML=dirListRow(d);
}

function openDirModal(id){
  const a=acct();if(!a)return;
  const d=a.directions.find(x=>x.id===id);if(!d)return;
  document.getElementById('dir-modal-content').innerHTML=buildDirModal(d);
  document.getElementById('dir-modal-overlay').classList.remove('hidden');
}
function closeDirModal(e,force){
  if(e&&e.target!==document.getElementById('dir-modal-overlay')&&!force)return;
  document.getElementById('dir-modal-overlay').classList.add('hidden');
  renderMain();
}

function buildDirModal(d){
  return `
  <div class="dir-modal-hd">
    <i class="ti ti-palette" style="color:rgba(255,255,255,.8);font-size:20px;flex-shrink:0"></i>
    <input value="${esc(d.name)}" placeholder="Direction doc name (e.g. Ramadan Campaign, BOFU Retargeting)..." oninput="updDir('${d.id}','name',this.value)"/>
    <button onclick="closeDirModal(null,true)" style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:13px;flex-shrink:0">✕ Close</button>
  </div>
  <div class="dir-modal-body">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="dir-field">
        <div class="dir-label">Visual Style</div>
        <select class="dir-sel" oninput="updDir('${d.id}','visualStyle',this.value)">
          <option value="">Select style</option>
          ${VIS_STYLES.map(s=>`<option value="${s}"${d.visualStyle===s?' selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="dir-field">
        <div class="dir-label">Tone & Mood</div>
        <select class="dir-sel" oninput="updDir('${d.id}','mood',this.value)">
          <option value="">Select tone</option>
          ${DIR_TONES.map(t=>`<option value="${t}"${d.mood===t?' selected':''}>${t}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="dir-field">
      <div class="dir-label">Typography / Font</div>
      <input class="dir-input" value="${esc(d.typography)}" placeholder="e.g. Cairo Bold for headlines, Tajawal for body text" oninput="updDir('${d.id}','typography',this.value)"/>
    </div>
    <div class="dir-field">
      <div class="dir-label">Color Palette</div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        ${(d.colors||['#054930','#0cb87d','#ffffff']).map((c,ci)=>`
          <div style="display:flex;align-items:center;gap:5px">
            <input type="color" class="color-swatch" value="${c}" oninput="(function(el){const a=acct();const dir=a.directions.find(x=>x.id==='${d.id}');if(dir){if(!dir.colors)dir.colors=['#054930','#0cb87d','#ffffff'];dir.colors[${ci}]=el.value;save()}})(this)"/>
            <span style="font-size:11px;color:var(--muted);font-family:monospace">${c}</span>
          </div>`).join('')}
        <input class="dir-input" style="flex:1;min-width:150px" value="${esc(d.colorNotes)}" placeholder="e.g. Brand green only, no red, no gradient" oninput="updDir('${d.id}','colorNotes',this.value)"/>
      </div>
    </div>
    <div class="dir-field">
      <div class="dir-label">Required Formats</div>
      <div class="format-checks">
        ${FORMATS.map(f=>`<label class="format-check"><input type="checkbox" ${(d.formats||[]).includes(f)?'checked':''} onchange="togDirFormat('${d.id}','${f}')"/> ${f}</label>`).join('')}
      </div>
    </div>
    <div class="dir-field">
      <div class="dir-label">Talent / People Guidelines</div>
      <textarea class="dir-ta" placeholder="e.g. Female presenter 25–35, casual Egyptian dialect, relatable home setting, no heavy makeup..." oninput="updDir('${d.id}','talentNotes',this.value)">${esc(d.talentNotes)}</textarea>
    </div>
    <div class="dir-field">
      <div class="dir-label">Music & Sound Direction</div>
      <textarea class="dir-ta" style="min-height:56px" placeholder="e.g. Upbeat instrumental only. Fast cuts every 2s. Sound effect on product reveal. No voiceover." oninput="updDir('${d.id}','music',this.value)">${esc(d.music)}</textarea>
    </div>
    <div class="dir-field">
      <div class="dir-label">Reference Links / Mood Board</div>
      <textarea class="dir-ta" style="min-height:56px" placeholder="https://... or describe: similar to [Brand]'s [Campaign name] style — fast cuts, UGC feel, bold text overlays" oninput="updDir('${d.id}','references',this.value)">${esc(d.references)}</textarea>
    </div>
    <div class="dir-field">
      <div class="dir-label">Additional Notes</div>
      <textarea class="dir-ta" style="min-height:56px" placeholder="Logo placement, safe zones, watermarks, file delivery format, aspect ratio notes..." oninput="updDir('${d.id}','notes',this.value)">${esc(d.notes)}</textarea>
    </div>
    <div style="display:flex;justify-content:space-between;padding-top:8px;border-top:1px solid var(--brd)">
      <button class="btn btn-d btn-sm" onclick="delDirection('${d.id}')"><i class="ti ti-trash"></i> Delete</button>
      <button class="btn btn-p btn-sm" onclick="closeDirModal(null,true)"><i class="ti ti-check"></i> Done</button>
    </div>
  </div>`;
}

function renderDirection(main,a){
  const dirs=a.directions||[];
  main.innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:20px">
    <div>
      <div style="font-size:22px;font-weight:800;color:var(--p)">${esc(a.name)} — Creative Direction</div>
      <div style="font-size:13px;color:var(--muted);margin-top:2px">${dirs.length} direction doc${dirs.length!==1?'s':''}</div>
    </div>
    <button class="btn btn-p btn-sm" onclick="addDirection()">＋ New Direction</button>
  </div>
  ${dirs.length===0?`
    <div class="empty" style="margin-top:40px">
      <div class="ei">🎨</div>
      <h3>No direction docs yet</h3>
      <p>Click <strong>＋ New Direction</strong> to create your first creative direction document.</p>
    </div>`
  :`<div class="dir-list">${dirs.map(d=>dirListRow(d)).join('')}</div>`}`;
}

function dirListRow(d){
  const fmts=(d.formats||[]).slice(0,3);
  const more=(d.formats||[]).length-3;
  return `<div class="dir-list-row" id="dlr-${d.id}" onclick="openDirModal('${d.id}')">
    <div class="dir-list-icon"><i class="ti ti-palette"></i></div>
    <div class="dir-list-name">${d.name||'<span style="color:#aaa;font-weight:400">Untitled Direction</span>'}</div>
    <div class="dir-list-meta">
      ${d.visualStyle?`<span class="dir-badge">🎬 ${esc(d.visualStyle)}</span>`:''}
      ${d.mood?`<span class="dir-badge">💬 ${esc(d.mood)}</span>`:''}
      ${(d.colors||[]).filter(c=>c&&c!=='#ffffff').map(c=>`<span style="display:inline-block;width:16px;height:16px;background:${c};border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px #ddd;flex-shrink:0"></span>`).join('')}
      ${fmts.map(f=>`<span class="dir-format-tag">${f.split(' ')[0]}</span>`).join('')}
      ${more>0?`<span class="dir-format-tag">+${more}</span>`:''}
    </div>
    <div class="dir-list-actions" onclick="event.stopPropagation()">
      <button class="btn btn-p btn-xs" onclick="openDirModal('${d.id}')"><i class="ti ti-edit"></i> Edit</button>
      <button class="btn btn-d btn-xs" onclick="delDirection('${d.id}',event)"><i class="ti ti-trash"></i></button>
    </div>
  </div>`;
}

// ── ACCOUNT TASK BOARD ──
function addAcctTask(){
  const a=acct();if(!a)return;
  const title=(document.getElementById('at-title')||{}).value||'';
  if(!title.trim())return;
  const pri=(document.getElementById('at-pri')||{}).value||'medium';
  const cat=(document.getElementById('at-cat')||{}).value||'';
  const due=(document.getElementById('at-due')||{}).value||'';
  a.acctTasks.unshift({id:uid(),title:title.trim(),priority:pri,category:cat,dueDate:due,status:'todo',notes:'',createdAt:new Date().toISOString()});
  save();renderMain();
}
function delAcctTask(id){const a=acct();if(!a)return;a.acctTasks=a.acctTasks.filter(x=>x.id!==id);save();renderMain()}
function moveAcctTask(id,dir){
  const a=acct();if(!a)return;
  const t=a.acctTasks.find(x=>x.id===id);if(!t)return;
  const order=['todo','doing','done'];
  const i=order.indexOf(t.status)+dir;
  if(i<0||i>2)return;
  t.status=order[i];save();renderMain();
}
function updAcctTask(id,f,v){const a=acct();if(!a)return;const t=a.acctTasks.find(x=>x.id===id);if(t){t[f]=v;save()}}
function togAcctTaskNotes(id){const el=document.getElementById('atn-'+id);if(el)el.classList.toggle('hidden')}

  <div class="task-add-bar">
    <input id="at-title" class="task-add-input" placeholder="New task for ${esc(a.name)}..." onkeydown="if(event.key==='Enter')addAcctTask()"/>

}
function delMyTask(id){db.myTasks=db.myTasks.filter(x=>x.id!==id);save();renderMain();renderTabs()}
function moveTask(id,dir){
  const t=db.myTasks.find(x=>x.id===id);if(!t)return;
  const order=['todo','doing','done'];
  const i=order.indexOf(t.status)+dir;
  if(i<0||i>2)return;
  t.status=order[i];save();renderMain();renderTabs();

function updMyTask(id,f,v){const t=db.myTasks.find(x=>x.id===id);if(t){t[f]=v;save();renderTabs()}}

// ── RENDER ──
function render(){renderTabs();renderSubBar();renderMain();updStats()}

function renderTabs(){
  const bar=document.getElementById('tabs-bar');
  const addBtn=document.getElementById('add-tab-btn');
  const tasksBtn=document.getElementById('my-tasks-btn');
  bar.innerHTML='';
  bar.appendChild(tasksBtn);
  tasksBtn.classList.toggle('active',gview==='mytasks');
  const open=(db.myTasks||[]).filter(t=>t.status!=='done').length;
  document.getElementById('my-tasks-badge').textContent=open;

  db.accounts.forEach(a=>{
    const pend=a.tasks.filter(t=>t.status!=='done').length;
    const btn=document.createElement('button');
    btn.className='tab-btn'+(a.id===db.active&&gview!=='mytasks'?' active':'');
    btn.innerHTML=`<span>${esc(a.name)}</span><span class="tab-count">${pend}</span><button class="tab-x" title="Delete">×</button>`;
    btn.onclick=()=>setAcc(a.id);
    btn.querySelector('.tab-x').onclick=e=>{e.stopPropagation();delAcc(a.id)};
    // drag-to-reorder accounts
    btn.draggable=true;
    btn.ondragstart=e=>{dragAccId=a.id;btn.classList.add('dragging');e.dataTransfer.effectAllowed='move'};
    btn.ondragend=()=>{dragAccId=null;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('dragging','drag-over'))};
    btn.ondragover=e=>{e.preventDefault();if(dragAccId&&dragAccId!==a.id)btn.classList.add('drag-over')};
    btn.ondragleave=()=>btn.classList.remove('drag-over');
    btn.ondrop=e=>{
      e.preventDefault();btn.classList.remove('drag-over');
      if(!dragAccId||dragAccId===a.id)return;
      const fi=db.accounts.findIndex(x=>x.id===dragAccId);
      const ti=db.accounts.findIndex(x=>x.id===a.id);
      const [moved]=db.accounts.splice(fi,1);
      db.accounts.splice(ti,0,moved);
      save();renderTabs();
    };
    bar.appendChild(btn);
  });
  bar.appendChild(addBtn);
}

function renderSubBar(){
  const el=document.getElementById('sub-tabs');
  const saveInd=document.getElementById('save-ind');
  if(acct()&&gview!=='mytasks'){
    el.classList.remove('hidden');
    // rebuild buttons in current order
    el.innerHTML='';
    const order=db.subTabOrder||DEFAULT_SUB_ORDER;
    order.forEach(key=>{
      const def=ALL_SUB_TABS.find(t=>t.key===key);if(!def)return;
      const btn=document.createElement('button');
      btn.className='sub-tab'+(sub===key?' active':'');
      btn.id='st-'+key;
      btn.innerHTML=`<i class="ti ${def.icon}"></i> ${def.label}`;
      btn.onclick=()=>switchSub(key);
      btn.draggable=true;
      btn.ondragstart=e=>{dragSubKey=key;btn.classList.add('dragging');e.dataTransfer.effectAllowed='move'};
      btn.ondragend=()=>{dragSubKey=null;document.querySelectorAll('.sub-tab').forEach(b=>b.classList.remove('dragging','drag-over'))};
      btn.ondragover=e=>{e.preventDefault();if(dragSubKey&&dragSubKey!==key)btn.classList.add('drag-over')};
      btn.ondragleave=()=>btn.classList.remove('drag-over');
      btn.ondrop=e=>{
        e.preventDefault();btn.classList.remove('drag-over');
        if(!dragSubKey||dragSubKey===key)return;
        const ord=[...(db.subTabOrder||DEFAULT_SUB_ORDER)];
        const fi=ord.indexOf(dragSubKey),ti=ord.indexOf(key);
        if(fi<0||ti<0)return;
        ord.splice(fi,1);ord.splice(ti,0,dragSubKey);
        db.subTabOrder=ord;save();renderSubBar();
      };
      el.appendChild(btn);
    });
    el.appendChild(saveInd);
  }else{el.classList.add('hidden')}
}

function renderMain(){
  const main=document.getElementById('main');
  if(gview==='mytasks'){renderMyTasks(main);return}
  const a=acct();
  if(!a){
    main.innerHTML=`<div class="empty" style="margin-top:60px"><div class="ei">📋</div><h3>No Accounts Yet</h3><p>Click <strong>＋</strong> in the tab bar to create your first account.</p></div>`;
    return;
  }
  if(sub==='tasks')renderTasks(main,a);
  else if(sub==='mp')renderMP(main,a);
  else if(sub==='rep')renderRep(main,a);
  else if(sub==='aud')renderAud(main,a);
  else if(sub==='brief')renderBrief(main,a);
  else if(sub==='strat')renderStrategy(main,a);
  else if(sub==='dir')renderDirection(main,a);
  else renderAcctTasks(main,a);
}

    <div class="ctrl">
      <label>Total Budget</label>
      <input type="number" id="mp-bud" value="${m.totalBudget||30000}" min="100" step="1000" onchange="saveMpS()" style="width:160px">
      <select id="mp-cur" onchange="saveMpS()" style="width:90px">
        ${['EGP','USD','SAR','AED','EUR','GBP'].map(c=>`<option value="${c}"${m.currency===c?' selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    <div class="ctrl">
      <label>Duration</label>
      <select id="mp-dur" onchange="saveMpS()" style="width:160px">
        ${[1,2,3,6,12].map(n=>`<option value="${n}"${m.duration==n?' selected':''}>${n} month${n>1?'s':''}</option>`).join('')}
      </select>
      <label>Objective</label>
      <select id="mp-obj" onchange="onObjCh()" style="width:180px">
        <option value="conversions"${m.objective==='conversions'?' selected':''}>Conversions</option>
        <option value="leads"${m.objective==='leads'?' selected':''}>Lead generation</option>
        <option value="traffic"${m.objective==='traffic'?' selected':''}>Traffic</option>
        <option value="awareness"${m.objective==='awareness'?' selected':''}>Brand awareness</option>
      </select>
    </div>
  </div></div>

  <div id="mp-met" class="metrics"></div>

  <div class="card"><div class="card-body">
    <div class="sec-t"><i class="ti ti-chart-pie"></i> Funnel Breakdown</div>
    <div id="mp-fbar" class="funnel-bar"></div>
    <div id="mp-flbl" class="funnel-labels"></div>
  </div></div>

  <div class="card"><div class="card-body">
    <div class="sec-t"><i class="ti ti-list"></i> Campaigns</div>
    <div class="toggles" id="mp-toggs"></div>
    <div class="tbl-wrap">
      <table><thead><tr id="mp-thead"></tr></thead><tbody id="mp-tbody"></tbody></table>
    </div>
    <button class="add-btn" onclick="addCamp()"><i class="ti ti-plus"></i> Add campaign</button>
  </div></div>

  <div class="card"><div class="card-body">
    <div class="sec-t"><i class="ti ti-chart-bar"></i> Budget Distribution</div>
    <div id="mp-pleg" class="plat-legend"></div>
    <div class="chart-wrap"><canvas id="mp-chart"></canvas></div>
  </div></div>

  <div class="card"><div class="card-body">
    <div class="sec-t"><i class="ti ti-target"></i> Expected Results</div>
    <p style="font-size:13px;color:#888;margin-bottom:14px">Click any value to edit. Add or remove KPIs as needed.</p>
    <div id="mp-kpis" class="kpi-grid"></div>
    <button class="add-btn" onclick="addKPI()"><i class="ti ti-plus"></i> Add KPI</button>
  </div></div>

  <div class="act-bar">
    <button onclick="expCSV()"><i class="ti ti-file-spreadsheet"></i> Export CSV</button>
    <button onclick="expTXT()"><i class="ti ti-download"></i> Export TXT</button>
    <button onclick="window.print()"><i class="ti ti-printer"></i> Print</button>
    <button onclick="resetPlan()"><i class="ti ti-refresh"></i> Reset</button>
  </div>`;
}

// ── STATS ──
function updStats(){
  const all=db.accounts.flatMap(a=>a.tasks);
  document.getElementById('s-acc').textContent=db.accounts.length;
  document.getElementById('s-tasks').textContent=all.length;
  document.getElementById('s-pend').textContent=all.filter(t=>t.status==='pending').length;
  document.getElementById('s-done').textContent=all.filter(t=>t.status==='done').length;
}

// ── INIT ──
load();
// migrate old accounts that don't have report field
db.accounts.forEach(a=>{
  if(!a.report)a.report={period:'',preparedBy:'',currency:'EGP',budgetTotal:'',budgetSpent:'',metrics:[],campaigns:[],topAds:[],campCols:defCampCols(),wins:'',challenges:'',recommendations:''};
  if(!a.report.topAds)a.report.topAds=[];
  if(!a.report.campCols)a.report.campCols=defCampCols();
  if(!a.audiences)a.audiences=[];
  if(!a.briefs)a.briefs=[];
  if(!a.strategy)a.strategy={usps:[],angles:[],hooks:[],testingPlan:'',funnelNotes:'',fatigueRules:'',winningPatterns:''};
  if(!a.strategy.usps)a.strategy.usps=[];
  if(!a.strategy.angles)a.strategy.angles=[];
  if(!a.strategy.hooks)a.strategy.hooks=[];
  if(!a.directions)a.directions=[];
  if(!a.acctTasks)a.acctTasks=[];
});
if(!db.myTasks)db.myTasks=[];
if(!db.subTabOrder||db.subTabOrder.length!==DEFAULT_SUB_ORDER.length)db.subTabOrder=[...DEFAULT_SUB_ORDER];
render();
</script>
</body>
</html>
